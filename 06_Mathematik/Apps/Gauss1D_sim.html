<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Normalverteilung 1D Simulation + Boxplot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      display: flex;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      gap: 2rem;
      max-width: 1000px;
      width: 100%;
    }
    #canvas-container {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }
    .controls {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    h1 { margin: 0 0 0.5rem 0; font-size: 1.8rem; color: #111827; }
    p { margin: 0; color: #4b5563; line-height: 1.5; }
    .slider-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-weight: 600; color: #374151; }
    input[type=range] { width: 100%; cursor: pointer; }
    .stats {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: #f9fafb;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .stat-row { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
    .stat-label { color: #4b5563; }
    .stat-value { font-weight: 600; color: #111827; }
    #formula-container {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
    }
    .btn-export {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      text-align: center;
      transition: background-color 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn-export:hover {
      background-color: #1d4ed8;
    }
    .btn-export:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

<div class="container">
  <div id="canvas-container"></div>
  <div class="controls">
    <div>
      <h1>Normalverteilung (1D)</h1>
      <p>Diese Skizze simuliert Punkte entlang einer Achse. Der Boxplot unten zeigt Quartile und Ausreißer live an.</p>
    </div>

    <div class="slider-group">
      <label for="sigma-slider">Standardabweichung (σ): <span id="sigma-value">60</span> px</label>
      <div id="sigma-slider"></div>
    </div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Gesamtpunkte</span>
        <span class="stat-value" id="count-total">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Punkte innerhalb 1σ</span>
        <span class="stat-value" id="count-1sigma">0</span>
      </div>
       <div class="stat-row">
        <span class="stat-label">Punkte innerhalb 2σ</span>
        <span class="stat-value" id="count-2sigma">0</span>
      </div>
       <div class="stat-row">
        <span class="stat-label">Punkte innerhalb 3σ</span>
        <span class="stat-value" id="count-3sigma">0</span>
      </div>
    </div>

    <button class="btn-export" onclick="downloadCSV()">Punkte als CSV speichern</button>

    <div id="formula-container">
        <div id="formula"></div>
    </div>
  </div>
</div>

<script>
// --- 1D VERSION (FINAL) ---

let centerX;
let axisY;
let sigmaSlider;
let points = [];
const samplesPerFrame = 5;
const maxPoints = 1000; 
const canvasWidth = 640;
const canvasHeight = 550; 

function setup() {
  const canvas = createCanvas(canvasWidth, canvasHeight);
  canvas.parent("canvas-container");

  centerX = width / 2;
  axisY = height / 2; 

  sigmaSlider = createSlider(10, 200, 60, 1);
  sigmaSlider.parent("sigma-slider");
  sigmaSlider.input(updateSigmaLabel);
  updateSigmaLabel();

  textFont("sans-serif");
  noLoop();
  loop();
}

function draw() {
  background(245);
  const sigma = sigmaSlider.value();

  samplePoints(sigma);
  const counts = countPoints(sigma);
  
  drawGuides(sigma);
  drawPoints();
  
  drawBoxPlot(); 

  drawHUD(sigma);
  updateCounters(counts);
  updateFormula(sigma);
}

function samplePoints(sigma) {
  for (let i = 0; i < samplesPerFrame; i++) {
    const x = randomGaussian(centerX, sigma);
    
    // d) Dynamischer Jitter ("Shape the cloud")
    const distFromMu = x - centerX;
    const gaussHeight = exp(-(distFromMu * distFromMu) / (2 * sigma * sigma));
    const jitterAmplitude = 70; 
    const yOffset = random(-jitterAmplitude * gaussHeight, jitterAmplitude * gaussHeight);
    
    const y = axisY + yOffset;
    
    points.push(createVector(x, y));
  }
  if (points.length > maxPoints) {
    points.splice(0, points.length - maxPoints);
  }
}

function drawPoints() {
  noStroke();
  fill(37, 99, 235, 120); 
  for (const p of points) {
    circle(p.x, p.y, 5);
  }
}

function countPoints(sigma) {
  let within1 = 0;
  let within2 = 0;
  let within3 = 0;
  
  for (const p of points) {
    const dist = abs(p.x - centerX);
    if (dist <= sigma) within1++;
    if (dist <= sigma * 2) within2++;
    if (dist <= sigma * 3) within3++;
  }
  return { total: points.length, within1, within2, within3 };
}

function drawGuides(sigma) {
  stroke(60, 64, 67);
  strokeWeight(2);
  line(0, axisY, width, axisY);

  stroke(34, 197, 94);
  strokeWeight(3);
  line(centerX, axisY - 70, centerX, axisY + 70);

  strokeWeight(2.5);
  const drawVert = (x, h, label) => {
      line(x, axisY - h, x, axisY + h);
      if (label) {
          noStroke();
          fill(60, 64, 67);
          textAlign(CENTER, BOTTOM);
          textSize(16);
          text(label, x, axisY - h - 25);
          stroke(60, 64, 67, 180);
      }
  };

  stroke(60, 64, 67, 180);
  drawVert(centerX - sigma, 20, "-1σ");
  drawVert(centerX + sigma, 20, "+1σ");
  
  stroke(60, 64, 67, 100);
  drawVert(centerX - sigma * 2, 15);
  drawVert(centerX + sigma * 2, 15);

  stroke(60, 64, 67, 60);
  drawVert(centerX - sigma * 3, 10);
  drawVert(centerX + sigma * 3, 10);

  noStroke();
  fill(34, 197, 94);
  textAlign(CENTER, BOTTOM);
  textSize(20);
  text("μ", centerX, axisY - 75);
}

function drawHUD(sigma) {
  fill(31);
  noStroke();
  textSize(16);
  textAlign(LEFT, BASELINE);
  text(`Zentrum (μ): x = ${centerX.toFixed(0)}`, 16, height - 450);
  text(`Standardabweichung (σ): ${sigma.toFixed(0)} px`, 16, height-430);
}

function mousePressed() {
  if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
    centerX = mouseX;
    resetPoints();
  }
}

function updateSigmaLabel() {
  const label = document.getElementById("sigma-value");
  if (label) {
    label.textContent = sigmaSlider.value();
  }
  resetPoints();
}

function updateCounters(counts) {
  const totalEl = document.getElementById("count-total");
  const oneSigmaEl = document.getElementById("count-1sigma");
  const twoSigmaEl = document.getElementById("count-2sigma");
  const threeSigmaEl = document.getElementById("count-3sigma");
  
  if (totalEl) totalEl.textContent = counts.total;
  if (oneSigmaEl) oneSigmaEl.textContent = counts.within1;
  if (twoSigmaEl) twoSigmaEl.textContent = counts.within2;
  if (threeSigmaEl) threeSigmaEl.textContent = counts.within3;
}

function updateFormula(sigma) {
  const fEl = document.getElementById("formula");
  if (!fEl) return;

  const muX = centerX.toFixed(0);
  const s = sigma.toFixed(0);

  const fractionStyle = 'display: inline-block; text-align: center; vertical-align: middle; margin: 0 4px; font-size: 0.95em;';
  const numerStyle = 'display: block; padding: 0 4px;';
  const denomStyle = 'display: block; border-top: 1px solid currentColor; padding: 0 4px;';

  const preFactor = `
    <span style="${fractionStyle}">
      <span style="${numerStyle}">1</span>
      <span style="${denomStyle}">${s} &radic;<span style="text-decoration:overline;">2&pi;</span></span>
    </span>`;

  const exponentFraction = `
    <span style="${fractionStyle} font-size: 0.8em;">
      <span style="${numerStyle}">(x - ${muX})<sup>2</sup></span>
      <span style="${denomStyle}">2 &middot; ${s}<sup>2</sup></span>
    </span>`;

  fEl.innerHTML = `
    <div style="font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;; font-size: 1.2rem; line-height: 1.4; color: #333;">
      <strong>Gauß-Dichtefunktion (1D):</strong><br><br>
      f(x) = ${preFactor} &middot; e <sup style="position: relative; top: -0.5em;">- ${exponentFraction}</sup>
    </div>
  `;
}

function resetPoints() {
  points = [];
}

function downloadCSV() {
  if (points.length === 0) {
    alert("Keine Punkte zum Speichern vorhanden.");
    return;
  }
  let csvContent = "x,y\n";
  points.forEach(p => {
    csvContent += `${p.x.toFixed(4)},${p.y.toFixed(4)}\n`;
  });
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", "normalverteilung_daten.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// --- FINALISIERTE BOXPLOT FUNKTION MIT AUSREIßERN ---

function drawBoxPlot() {
  if (points.length < 5) return;

  // 1. Datenbasis holen
  const xValues = points.map(p => p.x).sort((a, b) => a - b);
  
  // Gesamt-Min/Max für die Skalierung (nicht Whisker!)
  const dataMin = xValues[0];
  const dataMax = xValues[xValues.length - 1];

  // 2. Statistik berechnen
  const q1 = getPercentile(xValues, 0.25);
  const median = getPercentile(xValues, 0.50);
  const q3 = getPercentile(xValues, 0.75);
  const iqr = q3 - q1;

  // Whisker-Berechnung (1.5 * IQR)
  const lowerFence = q1 - 1.5 * iqr;
  const upperFence = q3 + 1.5 * iqr;

  // Tatsächliche Whisker-Enden (Datenpunkte innerhalb der Fences)
  let minWhisker = xValues.find(x => x >= lowerFence); 
  let maxWhisker = xValues[xValues.length - 1];
  for(let i = xValues.length - 1; i >= 0; i--) {
      if (xValues[i] <= upperFence) {
          maxWhisker = xValues[i];
          break;
      }
  }
  if (minWhisker === undefined) minWhisker = median;
  if (maxWhisker === undefined) maxWhisker = median;

  // 3. Layout Konstanten
  const separatorY = 410;
  const plotY = 460;
  const boxH = 30;
  
  // Bereich im Canvas für den Plot (Padding links/rechts)
  const plotLeft = 50;
  const plotRight = width - 50;

  // Trennlinie zeichnen
  stroke(200);
  strokeWeight(1);
  line(20, separatorY, width - 20, separatorY);
  
  noStroke();
  fill(100);
  textSize(12);
  textAlign(LEFT, BOTTOM);
  text("Boxplot (auto-skaliert)", 20, separatorY - 5);

  // 4. Mapping Funktion
  const toPlotX = (val) => {
      if (dataMax === dataMin) return width / 2; 
      return map(val, dataMin, dataMax, plotLeft, plotRight);
  };

  const pxMinW = toPlotX(minWhisker);
  const pxMaxW = toPlotX(maxWhisker);
  const pxQ1 = toPlotX(q1);
  const pxMed = toPlotX(median);
  const pxQ3 = toPlotX(q3);

  // 5. Zeichnen
  stroke(20);
  strokeWeight(1.5);
  
  // Whisker Linien
  line(pxMinW, plotY + boxH/2, pxQ1, plotY + boxH/2);
  line(pxMaxW, plotY + boxH/2, pxQ3, plotY + boxH/2);

  // Whisker Kappen
  line(pxMinW, plotY, pxMinW, plotY + boxH);
  line(pxMaxW, plotY, pxMaxW, plotY + boxH);

  // Box
  fill(255);
  rect(pxQ1, plotY, pxQ3 - pxQ1, boxH);

  // Median
  stroke(220, 38, 38);
  strokeWeight(2);
  line(pxMed, plotY, pxMed, plotY + boxH);

  // 6. Labels zeichnen
  const drawLabel = (val, x, isTop) => {
      noStroke();
      fill(60);
      textSize(11);
      textAlign(CENTER, isTop ? BOTTOM : TOP);
      const yPos = isTop ? plotY - 4 : plotY + boxH + 4;
      text(val.toFixed(0), x, yPos);
  };

  drawLabel(minWhisker, pxMinW, true);
  drawLabel(maxWhisker, pxMaxW, true);
  drawLabel(q1, pxQ1, false);
  drawLabel(median, pxMed, false);
  drawLabel(q3, pxQ3, false);

  // 7. NEU: Ausreißer zeichnen
  fill(220, 38, 38, 150); // Rot, transparent
  noStroke();
  for (let val of xValues) {
      // Alles was außerhalb der Whisker liegt, ist ein Ausreißer
      if (val < minWhisker || val > maxWhisker) {
          const px = toPlotX(val);
          circle(px, plotY + boxH/2, 5);
      }
  }
}

function getPercentile(sortedArr, p) {
  if (sortedArr.length === 0) return 0;
  const index = (sortedArr.length - 1) * p;
  const lower = Math.floor(index);
  const upper = Math.ceil(index);
  const weight = index - lower;

  if (upper >= sortedArr.length) return sortedArr[sortedArr.length - 1];
  return sortedArr[lower] * (1 - weight) + sortedArr[upper] * weight;
}
</script>
</body>
</html>
