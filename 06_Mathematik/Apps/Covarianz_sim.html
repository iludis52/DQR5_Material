<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovarianz & Korrelation (Detail-View)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        #app-wrapper {
            width: 950px; /* Etwas breiter für die lange Formel */
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #top-section {
            display: flex;
            flex-direction: row;
            border-bottom: 1px solid #eee;
        }

        #graph-container {
            width: 500px;
            height: 500px;
            background-color: #fff;
            flex-shrink: 0;
            border-right: 1px solid #eee;
        }

        #sidebar {
            padding: 25px;
            flex-grow: 1;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #calc-container {
            width: 100%;
            height: 350px;
            background-color: #fff;
            position: relative; /* Für absolute Positionierung von Tooltips falls nötig */
        }

        h2 { margin: 0 0 10px 0; color: #2c3e50; font-size: 1.4rem; }
        h3 { margin: 0 0 5px 0; color: #555; font-size: 1rem; }
        p { margin: 0; font-size: 0.9rem; line-height: 1.5; color: #666; }

        .control-box {
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background-color: #0056b3; }
        button.active { background-color: #0056b3; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }

        .formula-card {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="top-section">
            <div id="graph-container"></div>
            
            <div id="sidebar">
                <div>
                    <h2>Statistik Explorer</h2>
                    <p>Untersuche Kovarianz und Korrelation interaktiv.</p>
                </div>

                <div class="control-box">
                    <label style="display:block; margin-bottom:10px; font-weight:bold;">Ansicht:</label>
                    <button id="btnToggleHelpers">Hilfslinien anzeigen</button>
                    <p style="margin-top:10px; font-size:0.8rem; color:#888;">
                        Mittelwerte und Abstände werden nur eingeblendet, wenn aktiviert.
                    </p>
                </div>

                <div>
                    <h3>Kovarianz (Cov)</h3>
                    <div class="formula-card">
                        $$ Cov(X,Y) = \frac{1}{n} \sum (x_i - \bar{x})(y_i - \bar{y}) $$
                    </div>
                </div>

                <div>
                    <h3>Pearson Korrelation (r)</h3>
                    <div class="formula-card">
                        $$ r = \frac{Cov(X,Y)}{\sigma_x \cdot \sigma_y} $$
                    </div>
                </div>
            </div>
        </div>

        <div id="calc-container"></div>
    </div>

    <script>
        // --- Shared State ---
        const APP_STATE = {
            points: [
                {x: 2, y: 2, c: '#E63946'},
                {x: 3, y: 5, c: '#457B9D'},
                {x: 5, y: 4, c: '#2A9D8F'},
                {x: 7, y: 8, c: '#F4A261'},
                {x: 8, y: 6, c: '#9B5DE5'}
            ],
            showHelpers: false
        };

        document.addEventListener("DOMContentLoaded", () => {
            renderMathInElement(document.body);
            
            const btn = document.getElementById('btnToggleHelpers');
            btn.addEventListener('click', () => {
                APP_STATE.showHelpers = !APP_STATE.showHelpers;
                btn.textContent = APP_STATE.showHelpers ? "Hilfslinien verbergen" : "Hilfslinien anzeigen";
                btn.classList.toggle('active');
            });
        });

        // --- INSTANZ 1: Der Graph ---
        const graphSketch = (p) => {
            let draggedPoint = null;
            let margin = 50;

            p.setup = () => {
                let c = p.createCanvas(500, 500);
                c.parent('graph-container');
                p.textStyle(p.BOLD);
            };

            p.draw = () => {
                p.background(255);
                drawCoordinateSystem();
                drawPointsAndHelpers();
            };

            function drawCoordinateSystem() {
                let w = p.width - 2 * margin;
                
                // Gitter
                p.stroke(245);
                p.strokeWeight(1);
                for(let i=0; i<=10; i++) {
                    let pos = p.map(i, 0, 10, 0, w);
                    p.line(margin + pos, margin, margin + pos, p.height - margin);
                    p.line(margin, p.height - margin - pos, p.width - margin, p.height - margin - pos);
                }

                // Achsen
                p.stroke(50);
                p.strokeWeight(2);
                p.line(margin, p.height - margin, p.width - margin + 10, p.height - margin);
                p.line(margin, p.height - margin, margin, margin - 10);

                // Beschriftung
                p.fill(80);
                p.noStroke();
                p.textSize(12);
                p.textAlign(p.CENTER, p.TOP);
                for(let i=0; i<=10; i++) {
                    let x = p.map(i, 0, 10, margin, p.width - margin);
                    p.text(i, x, p.height - margin + 8);
                }
                p.textAlign(p.RIGHT, p.MIDDLE);
                for(let i=0; i<=10; i++) {
                    let y = p.map(i, 0, 10, p.height - margin, margin);
                    p.text(i, margin - 8, y);
                }
            }

            function drawPointsAndHelpers() {
                let sumX = 0, sumY = 0;
                APP_STATE.points.forEach(pt => { sumX += pt.x; sumY += pt.y; });
                let meanX = sumX / APP_STATE.points.length;
                let meanY = sumY / APP_STATE.points.length;

                let mapX = (val) => p.map(val, 0, 10, margin, p.width - margin);
                let mapY = (val) => p.map(val, 0, 10, p.height - margin, margin);

                let mx = mapX(meanX);
                let my = mapY(meanY);

                // --- ÄNDERUNG b) ---
                // Mittelwertlinien und Hilfslinien nur zeichnen, wenn Toggle aktiv
                if (APP_STATE.showHelpers) {
                    // Mean Lines
                    p.stroke(0, 180, 0, 100); 
                    p.drawingContext.setLineDash([5, 5]);
                    p.line(mx, margin, mx, p.height - margin);
                    p.line(margin, my, p.width - margin, my);
                    p.drawingContext.setLineDash([]);
                    
                    // Beschriftung Mean
                    p.noStroke();
                    p.fill(0, 150, 0);
                    p.textSize(11);
                    p.textAlign(p.LEFT, p.BOTTOM);
                    p.text("x̄=" + meanX.toFixed(1), mx + 4, margin);
                    p.textAlign(p.RIGHT, p.BOTTOM);
                    p.text("ȳ=" + meanY.toFixed(1), p.width - margin, my - 4);

                    // Verbindungslinien für Punkte
                    APP_STATE.points.forEach(pt => {
                        let px = mapX(pt.x);
                        let py = mapY(pt.y);
                        p.stroke(pt.c);
                        p.strokeWeight(2);
                        p.line(px, py, mx, py);
                        p.line(px, py, px, my);
                    });
                }

                // Punkte immer zeichnen
                APP_STATE.points.forEach(pt => {
                    let px = mapX(pt.x);
                    let py = mapY(pt.y);

                    p.noStroke();
                    p.fill(pt.c);
                    p.circle(px, py, 16);

                    // Hover/Drag Feedback
                    if (draggedPoint === pt || p.dist(p.mouseX, p.mouseY, px, py) < 15) {
                        p.stroke(50);
                        p.strokeWeight(1);
                        p.noFill();
                        p.circle(px, py, 20);
                        
                        p.fill(0);
                        p.noStroke();
                        p.textAlign(p.LEFT, p.BOTTOM);
                        p.text(`(${pt.x}, ${pt.y})`, px + 10, py - 10);
                    }
                });
            }

            // Drag Handler
            p.mousePressed = () => {
                if (p.mouseX < 0 || p.mouseX > p.width || p.mouseY < 0 || p.mouseY > p.height) return;
                
                let mapX = (val) => p.map(val, 0, 10, margin, p.width - margin);
                let mapY = (val) => p.map(val, 0, 10, p.height - margin, margin);
                
                let closest = null;
                let minDist = 30;

                APP_STATE.points.forEach(pt => {
                    let d = p.dist(p.mouseX, p.mouseY, mapX(pt.x), mapY(pt.y));
                    if(d < minDist) {
                        minDist = d;
                        closest = pt;
                    }
                });
                if(closest) draggedPoint = closest;
            };

            p.mouseDragged = () => {
                if(draggedPoint) {
                    let rawX = p.map(p.mouseX, margin, p.width - margin, 0, 10);
                    let rawY = p.map(p.mouseY, p.height - margin, margin, 0, 10);
                    draggedPoint.x = p.constrain(p.round(rawX), 0, 10);
                    draggedPoint.y = p.constrain(p.round(rawY), 0, 10);
                }
            };
            p.mouseReleased = () => { draggedPoint = null; };
        };

        // --- INSTANZ 2: Die Berechnungen ---
        const calcSketch = (p) => {
            p.setup = () => {
                let c = p.createCanvas(950, 350); // Etwas breiter
                c.parent('calc-container');
            };

            p.draw = () => {
                p.background(255);
                
                let n = APP_STATE.points.length;
                let sumX = 0, sumY = 0;
                APP_STATE.points.forEach(pt => { sumX += pt.x; sumY += pt.y; });
                let mx = sumX / n;
                let my = sumY / n;

                let covSum = 0;
                let varXSum = 0;
                let varYSum = 0;
                
                // Tokens erstellen
                let covTokens = [{t: `Cov(X,Y) = 1/${n} * [ `, c: '#000'}];
                let varXTokens = [{t: `Var(X) = 1/${n} * [ `, c: '#000'}];
                let varYTokens = [{t: `Var(Y) = 1/${n} * [ `, c: '#000'}];

                APP_STATE.points.forEach((pt, i) => {
                    let dx = pt.x - mx;
                    let dy = pt.y - my;
                    
                    covSum += (dx * dy);
                    varXSum += (dx * dx);
                    varYSum += (dy * dy);

                    let sep = (i < n-1) ? " + " : "";
                    
                    // --- ÄNDERUNG a) Ausgeschriebene Terme ---
                    // Format: (xi - mx)•(yi - my)
                    // xi und yi normal, mx und my fett (bold)
                    
                    // Klammer auf
                    covTokens.push({t: "(", c: '#999', sz: 14});
                    
                    // X Teil: (xi - mx)
                    covTokens.push({t: pt.x, c: pt.c, bold: false, sz: 14}); 
                    covTokens.push({t: "-", c: '#999', sz: 14});
                    covTokens.push({t: mx.toFixed(1), c: pt.c, bold: true, sz: 14}); // Mean Fett
                    
                    covTokens.push({t: ")•(", c: '#999', sz: 14});
                    
                    // Y Teil: (yi - my)
                    covTokens.push({t: pt.y, c: pt.c, bold: false, sz: 14});
                    covTokens.push({t: "-", c: '#999', sz: 14});
                    covTokens.push({t: my.toFixed(1), c: pt.c, bold: true, sz: 14}); // Mean Fett

                    covTokens.push({t: ")", c: '#999', sz: 14});

                    if(sep) covTokens.push({t: sep, c: '#ccc'});


                    // VarX Token (Quadrat) - hier lassen wir es kompakt wegen Platz, oder auch ausschreiben?
                    // Um Platz zu sparen und Fokus auf Cov zu legen, lasse ich Var kompakt als Quadrat
                    varXTokens.push({t: (dx*dx).toFixed(2), c: pt.c});
                    if(sep) varXTokens.push({t: sep, c: '#ccc'});

                    // VarY Token
                    varYTokens.push({t: (dy*dy).toFixed(2), c: pt.c});
                    if(sep) varYTokens.push({t: sep, c: '#ccc'});
                });

                // Ergebnisse berechnen
                let cov = covSum / n;
                let varX = varXSum / n;
                let varY = varYSum / n;
                let sx = Math.sqrt(varX);
                let sy = Math.sqrt(varY);
                let r = (sx * sy === 0) ? 0 : cov / (sx * sy);

                // Abschluss der Zeilen
                covTokens.push({t: ` ] = ${cov.toFixed(3)}`, c: '#000', bold:true, sz:16});
                
                varXTokens.push({t: ` ] = ${varX.toFixed(2)}`, c: '#000'});
                varXTokens.push({t: `  →  σx = ${sx.toFixed(3)}`, c: '#444', bold:true});

                varYTokens.push({t: ` ] = ${varY.toFixed(2)}`, c: '#000'});
                varYTokens.push({t: `  →  σy = ${sy.toFixed(3)}`, c: '#444', bold:true});

                // Zeichnen
                let startX = 20;
                let lineH = 50;
                let y = 60;

                // Zeile 1: Cov (Braucht evtl mehr Platz wegen der langen Formel, daher kleinere font size im Token definition gesetzt)
                drawTokens(p, covTokens, startX, y);
                
                // Zeile 2: Var X
                drawTokens(p, varXTokens, startX, y + lineH);

                // Zeile 3: Var Y
                drawTokens(p, varYTokens, startX, y + lineH * 2);

                // Trennlinie
                p.stroke(220);
                p.line(startX, y + lineH * 2.8, p.width - startX, y + lineH * 2.8);

                // Zeile 4: Korrelation
                let rColor = Math.abs(r) > 0.5 ? (r > 0 ? '#2A9D8F' : '#E63946') : '#333';
                let interpretation = "(keine Korrelation)";
                if (r > 0.1) interpretation = "(positive Korrelation)";
                if (r < -0.1) interpretation = "(negative Korrelation)";

                let corrTokens = [
                    {t: "Pearson Korrelation (r) = ", c: '#000'},
                    {t: "Cov / (σx • σy) = ", c: '#666'},
                    {t: `${cov.toFixed(3)} / (${sx.toFixed(3)} • ${sy.toFixed(3)})`, c: '#666'},
                    {t: " = " + r.toFixed(4), c: rColor, bold: true, sz: 22},
                    {t: "  " + interpretation, c: '#999', sz: 14}
                ];
                drawTokens(p, corrTokens, startX, y + lineH * 3.8);
            };

            function drawTokens(p, tokens, x, y) {
                let curX = x;
                p.textAlign(p.LEFT, p.BASELINE);
                
                tokens.forEach(tok => {
                    p.fill(tok.c);
                    if(tok.bold) p.textStyle(p.BOLD); else p.textStyle(p.NORMAL);
                    p.textSize(tok.sz || 16); // Fallback size 16
                    p.text(tok.t, curX, y);
                    curX += p.textWidth(tok.t);
                });
            }
        };

        new p5(graphSketch);
        new p5(calcSketch);

    </script>
</body>
</html>
