<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binomial zu Normalverteilung (N bis 40)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    
    /* Layout: Flex-Row für Side-by-Side */
    .container {
      display: flex;
      flex-direction: row; 
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      gap: 2rem;
      max-width: 1300px; /* Breiter für den großen Canvas */
      width: 100%;
      align-items: flex-start;
    }

    #canvas-container {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
      background: #f9fafb;
    }

    /* Controls rechts daneben */
    .controls {
      flex: 1; /* Nimmt den restlichen Platz */
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 { margin: 0 0 0.5rem 0; font-size: 1.8rem; color: #111827; }
    p { margin: 0; color: #4b5563; line-height: 1.5; font-size: 0.95rem; }
    
    .slider-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-weight: 600; color: #374151; }
    input[type=range] { width: 100%; cursor: pointer; }
    
    .stats {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: #f9fafb;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .stat-row { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
    .stat-label { color: #4b5563; }
    .stat-value { font-weight: 600; color: #111827; }
    
    #formula-container {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
    }

    .btn-group {
        display: flex;
        gap: 10px;
    }

    .btn {
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      text-align: center;
      transition: background-color 0.2s, transform 0.1s;
      flex: 1;
    }
    
    .btn-primary { background-color: #2563eb; }
    .btn-primary:hover { background-color: #1d4ed8; }
    
    .btn-secondary { background-color: #4b5563; }
    .btn-secondary:hover { background-color: #374151; }

    .btn:active { transform: translateY(1px); }

    /* Responsive Design für kleine Bildschirme */
    @media (max-width: 1100px) {
        .container { flex-direction: column; align-items: center; }
        .controls { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="canvas-container"></div>
  
  <div class="controls">
    <div>
      <h1>Binomial &rarr; Normal</h1>
      <p>Visualisierung des Grenzwertsatzes (De Moivre-Laplace).<br>
      Erhöhe <strong>N</strong> (Münzwürfe), um die Annäherung der Binomialverteilung an die Glockenkurve zu sehen.</p>
    </div>

    <div class="slider-group">
      <label for="n-slider">Anzahl Würfe (N): <span id="n-value">10</span></label>
      <div id="n-slider"></div>
    </div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Erwartungswert (&mu;)</span>
        <span class="stat-value" id="stat-mu">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Standardabw. (&sigma;)</span>
        <span class="stat-value" id="stat-sigma">0</span>
      </div>
       <div class="stat-row">
        <span class="stat-label">Simulierte Exp. (n)</span>
        <span class="stat-value">1000</span>
      </div>
    </div>
    
    <div class="btn-group">
        <button class="btn btn-secondary" onclick="manualResimulate()">&#8635; Neu simulieren</button>
        <button class="btn btn-primary" onclick="downloadCSV()">CSV Speichern</button>
    </div>

    <div id="formula-container">
        <div id="formula"></div>
    </div>
  </div>
</div>

<script>
// --- KONFIGURATION ---
const canvasWidth = 800; // Verbreitert
const canvasHeight = 550;
const simCount = 1000; // Anzahl der simulierten Experimente
const p_prob = 0.5;    // Wahrscheinlichkeit für "Kopf"

// --- GLOBALE VARIABLEN ---
let nSlider;
let currentN = 10;
let simulationData = []; 
let maxProb = 0; 

function setup() {
  const canvas = createCanvas(canvasWidth, canvasHeight);
  canvas.parent("canvas-container");

  // Slider für N (2 bis 40)
  nSlider = createSlider(2, 40, 10, 1);
  nSlider.parent("n-slider");
  nSlider.input(onSliderChange);

  textFont("sans-serif");
  
  // WICHTIG: Kein permanenter Loop, um Flackern zu verhindern!
  noLoop(); 
  
  // Initialisierung
  runSimulation();
  onSliderChange();
}

function draw() {
  background(245);

  // Layout-Definitionen
  const marginX = 50;
  const graphWidth = width - 2 * marginX;
  const graphBottom = 380; 
  const graphTop = 40;
  const graphHeight = graphBottom - graphTop;

  // Skalierung: X-Achse dynamisch
  // Wir sorgen dafür, dass immer etwas Platz rechts ist, aber zoomen auch rein bei kleinen N.
  // Minimum Range ist 20, sonst N + 5 Puffer.
  const maxAxisX = Math.max(20, currentN + 4); 
  const scaleX = graphWidth / maxAxisX; 
  
  // Skalierung: Y-Achse
  maxProb = binomialPDF(currentN, Math.floor(currentN/2), p_prob);
  const displayMaxY = maxProb * 1.25; 

  const mapX = (val) => marginX + val * scaleX;
  const mapY = (prob) => graphBottom - (prob / displayMaxY) * graphHeight;

  // 1. Achsen zeichnen
  drawAxes(marginX, graphBottom, graphWidth, maxAxisX, mapX);

  // 2. Binomialverteilung (Balken)
  drawHistogram(mapX, mapY, scaleX);

  // 3. Normalverteilung (Kurve)
  drawNormalCurve(mapX, mapY);

  // 4. Boxplot (Simulation)
  drawBoxPlotArea(mapX, maxAxisX);
}

// --- LOGIK & EVENTS ---

function onSliderChange() {
  const newVal = nSlider.value();
  
  // Simulation nur neu ausführen, wenn sich N wirklich ändert
  if (newVal !== currentN) {
      currentN = newVal;
      runSimulation(); // Neue Daten würfeln, da sich N geändert hat
  }
  
  updateUI();
  redraw(); // Einmal neu zeichnen
}

// Button "Neu simulieren"
function manualResimulate() {
    runSimulation();
    redraw();
}

function updateUI() {
  document.getElementById("n-value").textContent = currentN;
  
  const mu = currentN * p_prob;
  const sigma = Math.sqrt(currentN * p_prob * (1 - p_prob));
  
  document.getElementById("stat-mu").textContent = mu.toFixed(2);
  document.getElementById("stat-sigma").textContent = sigma.toFixed(2);
  
  updateFormula(currentN, mu, sigma);
}

function runSimulation() {
  simulationData = [];
  for(let i=0; i<simCount; i++) {
    let heads = 0;
    // Box-Muller wäre schneller für Normal, aber wir wollen echte Binomial simulieren
    // Also N mal würfeln:
    for(let j=0; j<currentN; j++) {
      if(Math.random() < p_prob) heads++;
    }
    simulationData.push(heads);
  }
}

// --- MATHEMATISCHE FUNKTIONEN ---

function factorial(n) {
  if (n === 0 || n === 1) return 1;
  let result = 1;
  for (let i = 2; i <= n; i++) result *= i;
  return result;
}

function nCr(n, r) {
  if (r < 0 || r > n) return 0;
  // Approximation für große Zahlen (optional), aber bei N=40 geht double noch gut.
  if(n > 200) return 0; // Fallback
  return factorial(n) / (factorial(r) * factorial(n - r));
}

// Damit Factorial bei N=40 nicht explodiert, berechnen wir BinomialPDF iterativ
function binomialPDF(n, k, p) {
    if (k < 0 || k > n) return 0;
    // N=40 ist mit 64-bit float noch handhabbar
    return nCr(n, k) * Math.pow(p, k) * Math.pow(1 - p, n - k);
}

function normalPDF(x, mu, sigma) {
  const exponent = -0.5 * Math.pow((x - mu) / sigma, 2);
  return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(exponent);
}

// --- ZEICHEN FUNKTIONEN ---

function drawAxes(xStart, yPos, w, maxVal, mapXFunc) {
  stroke(156, 163, 175);
  strokeWeight(2);
  line(xStart, yPos, xStart + w, yPos); // X-Achse

  noStroke();
  fill(107, 114, 128);
  textSize(12);
  textAlign(CENTER, TOP);
  
  // Ticks beschriften - Schrittweite anpassen je nach Zoom
  let step = 1;
  if (maxVal > 25) step = 2;
  if (maxVal > 40) step = 5;

  for (let i = 0; i <= maxVal; i+=step) {
      text(i, mapXFunc(i), yPos + 8);
      
      // Kleiner Tick-Mark
      stroke(200);
      strokeWeight(1);
      line(mapXFunc(i), yPos, mapXFunc(i), yPos + 4);
      noStroke();
  }
  
  textAlign(RIGHT, BOTTOM);
  text("Anzahl Kopf (k)", xStart + w, yPos - 5);
}

function drawHistogram(mapX, mapY, barWidthPx) {
  const bW = barWidthPx * 0.85; // Balkenbreite
  
  for (let k = 0; k <= currentN; k++) {
    const prob = binomialPDF(currentN, k, p_prob);
    const x = mapX(k);
    const y = mapY(prob);
    const h = mapY(0) - y;

    if (h < 1) continue; // Zu kleine Balken ignorieren

    fill(37, 99, 235, 140); 
    noStroke();
    rect(x - bW/2, y, bW, h);
  }
}

function drawNormalCurve(mapX, mapY) {
  const mu = currentN * p_prob;
  const sigma = Math.sqrt(currentN * p_prob * (1 - p_prob));

  noFill();
  stroke(220, 38, 38, 200); // Rot
  strokeWeight(3);

  beginShape();
  const startX = -1;
  const endX = currentN + 2; 
  // Schrittweite abhängig von Breite, damit Kurve smooth bleibt
  const step = 0.1; 
  
  for (let x = startX; x <= endX; x += step) {
    const yVal = normalPDF(x, mu, sigma);
    vertex(mapX(x), mapY(yVal));
  }
  endShape();
  
  // Erwartungswert Linie
  const mx = mapX(mu);
  const peakY = mapY(normalPDF(mu, mu, sigma));
  
  stroke(220, 38, 38, 100);
  strokeWeight(1);
  drawingContext.setLineDash([5, 5]);
  line(mx, mapY(0), mx, peakY);
  drawingContext.setLineDash([]);
}

function drawBoxPlotArea(mapX, maxAxisX) {
  const yBase = 460;
  const boxH = 40;
  
  // Trennlinie UI
  stroke(229, 231, 235);
  strokeWeight(1);
  line(20, 410, width-20, 410);
  
  noStroke();
  fill(55);
  textAlign(LEFT, BASELINE);
  textSize(14);
  text("Boxplot der 1000 simulierten Experimente", 20, 435);
  
  fill(100);
  textSize(11);
  text("(Hinweis: Punkte außerhalb der Whisker sind statistisch normale 'Ausreißer')", 20, 520);

  if (simulationData.length === 0) return;

  // Daten sortieren
  const sorted = [...simulationData].sort((a,b) => a-b);
  
  const q1 = getPercentile(sorted, 0.25);
  const median = getPercentile(sorted, 0.50);
  const q3 = getPercentile(sorted, 0.75);
  const iqr = q3 - q1;
  
  const minWhiskerVal = Math.max(sorted[0], q1 - 1.5 * iqr);
  const maxWhiskerVal = Math.min(sorted[sorted.length-1], q3 + 1.5 * iqr);

  const pxQ1 = mapX(q1);
  const pxMed = mapX(median);
  const pxQ3 = mapX(q3);
  const pxMin = mapX(minWhiskerVal);
  const pxMax = mapX(maxWhiskerVal);

  stroke(31, 41, 55);
  strokeWeight(1.5);
  
  // Whisker Linien
  line(pxMin, yBase + boxH/2, pxQ1, yBase + boxH/2);
  line(pxMax, yBase + boxH/2, pxQ3, yBase + boxH/2);
  
  // Whisker Enden (Caps)
  line(pxMin, yBase, pxMin, yBase + boxH);
  line(pxMax, yBase, pxMax, yBase + boxH);
  
  // Box
  fill(255);
  rect(pxQ1, yBase, pxQ3 - pxQ1, boxH);
  
  // Median
  stroke(220, 38, 38);
  strokeWeight(2);
  line(pxMed, yBase, pxMed, yBase + boxH);

  // Ausreißer zeichnen
  // Da wir noLoop() nutzen, berechnen wir den Jitter hier deterministisch basierend auf index
  // oder einfach Random, da es nur einmal pro Redraw aufgerufen wird.
  noStroke();
  fill(220, 38, 38, 120);
  
  let outlierCount = 0;
  for(let i=0; i<sorted.length; i++) {
      const val = sorted[i];
      if(val < minWhiskerVal || val > maxWhiskerVal) {
          outlierCount++;
          // Pseudo-Random Jitter, damit Punkte nicht perfekt deckungsgleich sind
          // Wir nutzen Math.random(), da draw() nur einmal läuft. Das Bild ist also statisch.
          const jitterY = (Math.random() - 0.5) * 14; 
          circle(mapX(val), yBase + boxH/2 + jitterY, 5);
      }
  }
}

// --- HELPER ---

function getPercentile(sortedArr, p) {
  if (sortedArr.length === 0) return 0;
  const index = (sortedArr.length - 1) * p;
  const lower = Math.floor(index);
  const upper = Math.ceil(index);
  const weight = index - lower;
  return sortedArr[lower] * (1 - weight) + sortedArr[upper] * weight;
}

function updateFormula(n, mu, sigma) {
  const fEl = document.getElementById("formula");
  if (!fEl) return;

  const muStr = mu.toFixed(1);
  const sigmaStr = sigma.toFixed(2);
  const varianceStr = (n * 0.25).toFixed(2);

  fEl.innerHTML = `
    <div style="font-family: sans-serif; font-size: 0.95rem; line-height: 1.5; color: #333;">
      <strong>Formeln (De Moivre-Laplace):</strong><br>
      <div style="margin-top:8px;">
        <span style="color: #2563eb; font-weight:bold;">Binomial:</span><br>
        E(X) = N·p = ${muStr}<br>
        Var(X) = N·p·(1-p) = ${varianceStr}
      </div>
      <div style="margin-top:8px;">
        <span style="color: #dc2626; font-weight:bold;">Normal-Approx.:</span><br>
        &mu; = ${muStr}, &sigma; = ${sigmaStr}
      </div>
    </div>
  `;
}

function downloadCSV() {
  if (simulationData.length === 0) {
    alert("Keine Daten vorhanden.");
    return;
  }
  let csvContent = "ExperimentID,AnzahlKopf(k)\n";
  simulationData.forEach((val, index) => {
    csvContent += `${index+1},${val}\n`;
  });
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `binomial_N${currentN}_sim.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
</html>
