<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumPy & iloc Slicing Trainer EASY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #2c3e50; margin-bottom: 20px; }

        .main-wrapper {
            width: 1000px;
            background: white;
            display: flex;
            gap: 30px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            align-items: flex-start;
        }

        #canvas-container {
            flex: 0 0 550px; /* Breiterer Canvas-Bereich */
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            background-color: white;
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .task-box {
            background-color: #ecf0f1;
            padding: 20px;
            border-left: 6px solid #3498db;
            border-radius: 4px;
        }

        .notation-hint {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #856404;
        }

        input {
            padding: 15px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            border: 2px solid #ced4da;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #3498db; }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: bold;
        }

        #check-button { background-color: #2ecc71; color: white; }
        #check-button:hover { background-color: #27ae60; }

        #new-task-button { background-color: #3498db; color: white; }
        #new-task-button:hover { background-color: #2980b9; }

        #feedback {
            font-weight: bold;
            font-size: 1.1em;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <h1>NumPy & iloc Slicing Trainer EASY 🐍</h1>

    <div class="main-wrapper">
        <div id="canvas-container"></div>

        <div class="controls">
            <div class="task-box">
                <strong>Aktuelle Aufgabe:</strong>
                <p id="task-text" style="font-size: 1.1em; margin-top: 10px;">Lade App...</p>
            </div>

            <div class="notation-hint">
                <strong>Erwartete Notation:</strong><br>
                <code>arr[zeilen, spalten]</code> oder <code>df.iloc[zeilen, spalten]</code>
            </div>

            <div>
                <label for="slicing-input" style="font-weight: bold; display: block; margin-bottom: 5px;">Deine Eingabe:</label>
                <input type="text" id="slicing-input" placeholder="z.B. arr[1:3, :]" autofocus>
            </div>

            <div class="button-group">
                <button id="check-button">Prüfen (Enter)</button>
                <button id="new-task-button">Neue Aufgabe</button>
            </div>
            
            <div id="feedback"></div>

            <div style="font-size: 0.85em; color: #7f8c8d; line-height: 1.4;">
                <i>Tipp: Nutze den Doppelpunkt <code>:</code> für Bereiche. Ein leerer Bereich <code>:</code> wählt die gesamte Achse aus.</i>
            </div>
        </div>
    </div>

    <script>
        let matrix = [];
        let targetSlice = null;
        let userSlice = null;
        const rows = 5;
        const cols = 5;
        const cellSize = 80; // Etwas größere Zellen
        const offset = 60;   // Platz für die Achsen-Nummerierung

        function setup() {
            // Canvas-Größe inklusive Offset für Achsen
            const canvas = createCanvas(cols * cellSize + offset, rows * cellSize + offset);
            canvas.parent('canvas-container');
            
            select('#check-button').mousePressed(checkSlice);
            select('#new-task-button').mousePressed(generateNewTask);
            
            select('#slicing-input').elt.addEventListener('keyup', function(event) {
                if (event.key === 'Enter') checkSlice();
            });

            textAlign(CENTER, CENTER);
            generateNewTask();
        }

        function draw() {
            background(255);
            
            // Ursprung verschieben, um Platz für Beschriftung zu machen
            translate(offset, offset);

            drawAxisLabels();

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let x = c * cellSize;
                    let y = r * cellSize;
                    
                    stroke(220);
                    fill(255);
                    rect(x, y, cellSize, cellSize);
                    
                    fill(44, 62, 80);
                    noStroke();
                    textSize(22);
                    text(matrix[r][c], x + cellSize/2, y + cellSize/2);
                }
            }

            if (targetSlice) {
                drawHighlight(targetSlice, color(46, 204, 113, 100), color(46, 204, 113));
            }

            if (userSlice) {
                drawHighlight(userSlice, color(231, 76, 60, 120), color(231, 76, 60));
            }

            // Hinweis unten rechts im Canvas
            resetMatrix(); // Zurücksetzen für absolute Positionierung am Rand
            drawLegendText();
        }

        function drawAxisLabels() {
            textSize(14);
            fill(127, 140, 141);
            noStroke();

            for(let i=0; i<rows; i++) {
                // Axis 0 (Zeilen) - Vertikal links
                text(i, -30, i * cellSize + cellSize/2);
            }
            for(let i=0; i<cols; i++) {
                // Axis 1 (Spalten) - Horizontal oben
                text(i, i * cellSize + cellSize/2, -30);
            }

            // Achsen-Titel
            fill(52, 152, 219);
            push();
            translate(-45, (rows * cellSize)/2);
            rotate(-HALF_PI);
            text("axis 0 (Zeilen) →", 0, 0);
            pop();

            text("axis 1 (Spalten) →", (cols * cellSize)/2, -45);
        }

        function drawLegendText() {
            fill(180);
            textSize(11);
            textAlign(RIGHT, BOTTOM);
            text("Zeilen: axis 0 | Spalten: axis 1", width - 10, height - 10);
            textAlign(CENTER, CENTER); // Reset für andere Texte
        }

        function drawHighlight(slice, fillColor, strokeColor) {
            fill(fillColor);
            stroke(strokeColor);
            strokeWeight(4);
            let x = slice.colStart * cellSize;
            let y = slice.rowStart * cellSize;
            let w = (slice.colEnd - slice.colStart) * cellSize;
            let h = (slice.rowEnd - slice.rowStart) * cellSize;
            rect(x + 2, y + 2, w - 4, h - 4);
            strokeWeight(1);
        }

        function generateNewTask() {
            matrix = Array.from({ length: rows }, () => 
                Array.from({ length: cols }, () => Math.floor(Math.random() * 90 + 10))
            );
            let r1 = Math.floor(Math.random() * (rows - 1));
            let r2 = Math.floor(Math.random() * (rows - r1)) + r1 + 1;
            let c1 = Math.floor(Math.random() * (cols - 1));
            let c2 = Math.floor(Math.random() * (cols - c1)) + c1 + 1;
            targetSlice = { rowStart: r1, rowEnd: r2, colStart: c1, colEnd: c2 };
            userSlice = null;
            select('#feedback').html('');
            select('#slicing-input').value('');
            updateTaskText();
        }

        function updateTaskText() {
            const modes = [
                `Wähle den markierten Bereich mit Slicing aus.`,
                `Schreibe den Befehl für <code>iloc</code>, um diesen Bereich zu erhalten.`,
                `Nutze die <code>arr[...]</code> Syntax für den grünen Block.`
            ];
            select('#task-text').html(modes[Math.floor(Math.random() * modes.length)]);
        }

        function checkSlice() {
            const input = select('#slicing-input').value();
            const parsed = parseFlexibleSyntax(input);

            if (!parsed) {
                select('#feedback').html('<span style="color: #e67e22;">Format nicht erkannt! Nutze z.B. arr[1:3, :]</span>');
                return;
            }

            userSlice = parsed;
            if (JSON.stringify(userSlice) === JSON.stringify(targetSlice)) {
                select('#feedback').html('<span style="color: #27ae60;">Richtig! 🎉</span>');
            } else {
                select('#feedback').html('<span style="color: #e74c3c;">Nicht ganz. Rot zeigt dein Ergebnis.</span>');
            }
        }

        function parseFlexibleSyntax(str) {
            try {
                let content = str;
                if (str.includes('[')) {
                    content = str.substring(str.indexOf('[') + 1, str.lastIndexOf(']'));
                }
                content = content.replace(/\s/g, '');
                
                let parts = content.split(',');
                if (parts.length !== 2) return null;

                const parsePart = (p, max) => {
                    if (p === ':' || p === '') return { s: 0, e: max };
                    if (!p.includes(':')) {
                        let val = parseInt(p);
                        return { s: val, e: val + 1 };
                    }
                    let [start, end] = p.split(':');
                    let sVal = start === '' ? 0 : parseInt(start);
                    let eVal = end === '' ? max : parseInt(end);
                    return { s: sVal, e: eVal };
                };

                let rowRes = parsePart(parts[0], rows);
                let colRes = parsePart(parts[1], cols);

                if (isNaN(rowRes.s) || isNaN(rowRes.e) || isNaN(colRes.s) || isNaN(colRes.e)) return null;
                return { rowStart: rowRes.s, rowEnd: rowRes.e, colStart: colRes.s, colEnd: colRes.e };
            } catch (e) { return null; }
        }
    </script>
</body>
</html>
