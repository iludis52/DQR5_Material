<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preflight-Check – ML-Arbeitsumgebung</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.flow { font-family: var(--font-sans); max-width: 680px; padding: 12px 0; }
.flow-title { font-size: 18px; font-weight: 500; color: #1B3A5C; text-align: center; margin-bottom: 4px; }
.flow-sub { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-bottom: 16px; }
.progress-wrap { margin: 0 20px 6px; display: flex; align-items: center; gap: 10px; }
.progress-bar { flex: 1; height: 8px; background: var(--color-border-tertiary); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: #2E75B6; border-radius: 4px; transition: width 0.4s ease; }
.progress-text { font-size: 12px; font-weight: 500; color: #2E75B6; min-width: 44px; text-align: right; }
.section { margin-bottom: 2px; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--color-border-tertiary); transition: border-color 0.3s; }
.section.complete { border-color: #2D8B4E; }
.section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; }
.section-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.section-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.section-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 10px; transition: all 0.3s; }
.section-badge.pending { background: #D5E8F0; color: #1B3A5C; }
.section-badge.done { background: #d4edda; color: #1a5928; }
.section-items { padding: 2px 14px 12px 60px; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; cursor: pointer; user-select: none; border-radius: 6px; }
.check-item:hover .check-box:not(.checked) { border-color: #2E75B6; }
.check-box { width: 20px; height: 20px; border: 2px solid #999; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; background: var(--color-background-primary); }
.check-box.checked { background: #2E75B6; border-color: #2E75B6; }
.check-box.checked::after { content: ''; display: block; width: 5px; height: 9px; border: solid #fff; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg) translateY(-1px); }
.check-label { font-size: 13px; line-height: 1.5; color: var(--color-text-primary); transition: all 0.2s; }
.check-label.checked { color: var(--color-text-tertiary); text-decoration: line-through; }
.connector { display: flex; justify-content: center; padding: 1px 0; }
.connector svg { width: 20px; height: 14px; }
.s-a .section-icon { background: #D5E8F0; color: #1B3A5C; }
.s-a .section-header { background: #eef5fa; }
.s-b .section-icon { background: #d4edda; color: #1a5928; }
.s-b .section-header { background: #eef7f0; }
.s-c .section-icon { background: #e0d8f5; color: #3C3489; }
.s-c .section-header { background: #f2eff9; }
.s-d .section-icon { background: #fde8c8; color: #854F0B; }
.s-d .section-header { background: #fdf5ea; }
.s-e .section-icon { background: #f5cece; color: #791F1F; }
.s-e .section-header { background: #fbefef; }
.s-f .section-icon { background: #c8ede0; color: #085041; }
.s-f .section-header { background: #edf8f4; }
@media (prefers-color-scheme: dark) {
  .flow-title { color: #85B7EB; }
  .progress-fill { background: #378ADD; }
  .progress-text { color: #85B7EB; }
  .section-badge.pending { background: #0C447C; color: #B5D4F4; }
  .section-badge.done { background: #085041; color: #5DCAA5; }
  .check-box { border-color: #666; background: var(--color-background-secondary); }
  .check-box.checked { background: #378ADD; border-color: #378ADD; }
  .s-a .section-icon { background: #0C447C; color: #B5D4F4; }
  .s-a .section-header { background: rgba(12,68,124,0.15); }
  .s-b .section-icon { background: #27500A; color: #C0DD97; }
  .s-b .section-header { background: rgba(39,80,10,0.15); }
  .s-c .section-icon { background: #3C3489; color: #CECBF6; }
  .s-c .section-header { background: rgba(60,52,137,0.15); }
  .s-d .section-icon { background: #633806; color: #FAC775; }
  .s-d .section-header { background: rgba(99,56,6,0.15); }
  .s-e .section-icon { background: #791F1F; color: #F7C1C1; }
  .s-e .section-header { background: rgba(121,31,31,0.15); }
  .s-f .section-icon { background: #085041; color: #9FE1CB; }
  .s-f .section-header { background: rgba(8,80,65,0.15); }
}
.reset-btn { display: block; margin: 12px auto 0; padding: 6px 18px; font-size: 12px; color: var(--color-text-tertiary); background: none; border: 1.5px solid var(--color-border-tertiary); border-radius: 8px; cursor: pointer; font-family: var(--font-sans); }
.reset-btn:hover { color: #1B3A5C; border-color: #2E75B6; }

:root {
  --font-sans: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
  --color-text-primary: #1f2937;
  --color-text-tertiary: #6b7280;
  --color-border-tertiary: #d1d5db;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f9fafb;
}
html, body {
  background: #ffffff;
  color: var(--color-text-primary);
}
.flow {
  font-family: var(--font-sans);
}
.reset-btn {
  font-family: var(--font-sans);
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary: #e5e7eb;
    --color-text-tertiary: #9ca3af;
    --color-border-tertiary: #374151;
    --color-background-primary: #111827;
    --color-background-secondary: #1f2937;
  }
  html, body {
    background: #111827;
    color: var(--color-text-primary);
  }
}
</style>
</head>
<body>

<div class="flow">
  <div class="flow-title">Preflight-Check: ML-Arbeitsumgebung</div>
  <div class="flow-sub">Vor jeder Session durchgehen — wie ein Pilot vor dem Start</div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-text" id="ptext">0 / 23</div>
  </div>
  <div id="sections"></div>
  <button class="reset-btn" onclick="resetAll()">Zurücksetzen</button>
</div>
<script>
const data = [
  { id:'a', cls:'s-a', icon:'\uD83D\uDCC2', title:'A — Dateisystem & Pfade', items: [
    'Ich weiß, wo heruntergeladene Dateien gespeichert werden',
    'Ich kann lokal vs. Cloud-Ordner unterscheiden (OneDrive, iCloud)',
    'Absoluter vs. relativer Pfad ist mir klar',
    'Ich kann Dateien gezielt kopieren / verschieben'
  ]},
  { id:'b', cls:'s-b', icon:'\uD83D\uDDC2\uFE0F', title:'B — Projektordner & Struktur', items: [
    'Jedes Projekt hat einen eigenen Ordner (nicht Desktop / Downloads)',
    'Ich erstelle Unterordner: data/, notebooks/, models/, scripts/',
    'Neue Dateien landen bewusst im richtigen Unterordner',
    'Ich verstehe, warum alle Dateien im selben Ordnerbaum liegen müssen'
  ]},
  { id:'c', cls:'s-c', icon:'\uD83D\uDCBB', title:'C — Datei-Explorer & VS\u00a0Code', items: [
    'Ich kann im Explorer / Finder gezielt zu einem Ordner navigieren',
    'Ich kann einen Ordner per Rechtsklick in VS\u00a0Code öffnen',
    'VS\u00a0Code öffnet immer einen Ordner als Arbeitsbereich — verstanden',
    'Ich kann in der VS\u00a0Code-Seitenleiste Dateien erstellen und verschieben'
  ]},
  { id:'d', cls:'s-d', icon:'\uD83D\uDC0D', title:'D — Python-Environments (VS\u00a0Code)', items: [
    'Ich weiß, was ein virtuelles Environment ist und warum es existiert',
    'Ich kann über die „Python Environments"-Extension ein Environment erstellen',
    'Ich kann in VS\u00a0Code den richtigen Python-Interpreter auswählen',
    'Pakete sind nur im aktiven Environment verfügbar — verstanden'
  ]},
  { id:'e', cls:'s-e', icon:'\uD83D\uDCBE', title:'E — Speicherplatz & Hygiene', items: [
    'Ich weiß, wie viel Platz auf meiner Festplatte frei ist',
    'Ich kann große, unnötige Dateien finden und löschen',
    'Jupyter-Outputs vor dem Speichern löschen — kenne ich'
  ]},
  { id:'f', cls:'s-f', icon:'\uD83D\uDD17', title:'F — Dateien orchestrieren', items: [
    'Datenfluss nachvollziehen: Daten → Training → Modell → App',
    'Ich kann .pkl / .joblib an definiertem Ort speichern und laden',
    'Ordnerstruktur für Gradio-Deployment ist mir klar'
  ]}
];

const state = {};
let total = 0;
data.forEach(s => s.items.forEach((_, i) => { state[s.id+i] = false; total++; }));

function render() {
  const checked = Object.values(state).filter(Boolean).length;
  document.getElementById('pbar').style.width = (checked/total*100)+'%';
  document.getElementById('ptext').textContent = checked + ' / ' + total;
  const cont = document.getElementById('sections');
  cont.innerHTML = '';
  data.forEach((s, si) => {
    const sChecked = s.items.filter((_, i) => state[s.id+i]).length;
    const complete = sChecked === s.items.length;
    const sec = document.createElement('div');
    sec.className = 'section ' + s.cls + (complete ? ' complete' : '');
    sec.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${s.icon}</div>
        <div class="section-title">${s.title}</div>
        <div class="section-badge ${complete ? 'done' : 'pending'}">${complete ? '✓ fertig' : sChecked+'/'+s.items.length}</div>
      </div>
      <div class="section-items">${s.items.map((item, i) => {
        const k = s.id + i;
        const c = state[k];
        return `<div class="check-item" onclick="toggle('${k}')">
          <div class="check-box ${c ? 'checked' : ''}"></div>
          <div class="check-label ${c ? 'checked' : ''}">${item}</div>
        </div>`;
      }).join('')}</div>`;
    cont.appendChild(sec);
    if (si < data.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = '<svg viewBox="0 0 20 14"><line x1="10" y1="0" x2="10" y2="10" stroke="#2E75B6" stroke-width="1.5" opacity="0.4"/><path d="M6 6L10 12L14 6" fill="none" stroke="#2E75B6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/></svg>';
      cont.appendChild(conn);
    }
  });
}

function toggle(k) { state[k] = !state[k]; render(); }
function resetAll() { Object.keys(state).forEach(k => state[k] = false); render(); }
render();
</script>

</body>
</html>
