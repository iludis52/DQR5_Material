<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            background: #f0f1f5;
            overflow: auto;
        }

        #root {
            width: 100%;
            min-height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        select {
            outline: none;
        }

        select:focus {
            border-color: #4373cc !important;
        }

        button {
            outline: none;
            transition: all .12s;
        }

        button:hover:not(:disabled) {
            filter: brightness(0.95);
        }

        button:active:not(:disabled) {
            filter: brightness(0.9);
        }

        input[type=range] {
            height: 4px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {

        ::-webkit-scrollbar-thumb {

        .edit-cell {

            color: inherit;
            font: inherit;

            outline: none;

        .edit-cell:focus {
            background: #e8ecf4;
            border-radius: 2px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useRef, useCallback, useEffect } = React;

        // ═══════════════════════════════════════════════════════════════
        // NEURAL NETWORK ENGINE
        // ═══════════════════════════════════════════════════════════════

        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

        const Activations = {
            relu: { f: x => Math.max(0, x), df: x => x > 0 ? 1 : 0 },
            sigmoid: {
                f: x => 1 / (1 + Math.exp(-clamp(x, -500, 500))),
                df: x => { const s = 1 / (1 + Math.exp(-clamp(x, -500, 500))); return s * (1 - s); }
            },
            tanh: { f: x => Math.tanh(x), df: x => 1 - Math.tanh(x) ** 2 },
            softmax: { f: null, df: x => x * (1 - x) }
        };

        function softmaxArray(arr) {
            const mx = Math.max(...arr);
            const exps = arr.map(v => Math.exp(clamp(v - mx, -500, 500)));
            const sum = exps.reduce((a, b) => a + b, 0) || 1;
            return exps.map(v => v / sum);
        }

        function createNetwork(sizes, acts) {
            const layers = [];
            for (let i = 1; i < sizes.length; i++) {
                const fan = sizes[i - 1], sc = Math.sqrt(2 / fan), weights = [], biases = [];
                for (let j = 0; j < sizes[i]; j++) {
                    const w = []; for (let k = 0; k < fan; k++) w.push((Math.random() - .5) * 2 * sc);
                    weights.push(w); biases.push((Math.random() - .5) * .1);
                }
                layers.push({ weights, biases, activation: acts[i - 1], size: sizes[i], prevSize: fan });
            }
            return layers;
        }

        function forwardPass(net, input) {
            let cur = [...input]; const outs = [cur.slice()], raws = [cur.slice()];
            for (const L of net) {
                const raw = [];
                for (let j = 0; j < L.size; j++) { let s = L.biases[j]; for (let k = 0; k < L.prevSize; k++) s += L.weights[j][k] * cur[k]; raw.push(s); }
                raws.push(raw);
                cur = L.activation === "softmax" ? softmaxArray(raw) : raw.map(v => Activations[L.activation].f(v));
                outs.push(cur.slice());
            }
            return { output: cur, layerOutputs: outs, layerRaw: raws };
        }

        function trainStep(net, data, lr) {
            let totalLoss = 0;
            const gW = net.map(l => l.weights.map(w => w.map(() => 0)));
            const gB = net.map(l => l.biases.map(() => 0));
            for (const s of data) {
                const { layerOutputs: outs, layerRaw: raws } = forwardPass(net, s.input);
                const out = outs[outs.length - 1], tgt = s.output;
                for (let i = 0; i < out.length; i++) totalLoss += (out[i] - tgt[i]) ** 2;
                let deltas = new Array(out.length);
                const la = net[net.length - 1].activation;
                if (la === "softmax") { for (let i = 0; i < out.length; i++)deltas[i] = out[i] - tgt[i]; }
                else { for (let i = 0; i < out.length; i++)deltas[i] = (out[i] - tgt[i]) * Activations[la].df(raws[raws.length - 1][i]); }
                for (let l = net.length - 1; l >= 0; l--) {
                    const prev = outs[l], nd = new Array(net[l].prevSize).fill(0);
                    for (let j = 0; j < net[l].size; j++) { gB[l][j] += deltas[j]; for (let k = 0; k < net[l].prevSize; k++) { gW[l][j][k] += deltas[j] * prev[k]; nd[k] += deltas[j] * net[l].weights[j][k]; } }
                    if (l > 0) { const pa = net[l - 1].activation; deltas = nd.map((d, i) => pa === "softmax" ? d * Activations.softmax.df(outs[l][i]) : d * Activations[pa].df(raws[l][i])); }
                }
            }
            const n = data.length || 1;
            for (let l = 0; l < net.length; l++)for (let j = 0; j < net[l].size; j++) { net[l].biases[j] -= lr * gB[l][j] / n; for (let k = 0; k < net[l].prevSize; k++)net[l].weights[j][k] -= lr * gW[l][j][k] / n; }
            return totalLoss / n;
        }


        // ═══════════════════════════════════════════════════════════════
        // PRESETS
        // ═══════════════════════════════════════════════════════════════

        const IRIS_RAW = [[5.1, 3.5, 1.4, .2, 0], [4.9, 3, 1.4, .2, 0], [4.7, 3.2, 1.3, .2, 0], [4.6, 3.1, 1.5, .2, 0], [5, 3.6, 1.4, .2, 0], [5.4, 3.9, 1.7, .4, 0], [4.6, 3.4, 1.4, .3, 0], [5, 3.4, 1.5, .2, 0], [4.4, 2.9, 1.4, .2, 0], [4.9, 3.1, 1.5, .1, 0], [5.4, 3.7, 1.5, .2, 0], [4.8, 3.4, 1.6, .2, 0], [4.8, 3, 1.4, .1, 0], [4.3, 3, 1.1, .1, 0], [5.8, 4, 1.2, .2, 0], [5.7, 4.4, 1.5, .4, 0], [5.4, 3.9, 1.3, .4, 0], [5.1, 3.5, 1.4, .3, 0], [5.7, 3.8, 1.7, .3, 0], [5.1, 3.8, 1.5, .3, 0], [5.4, 3.4, 1.7, .2, 0], [5.1, 3.7, 1.5, .4, 0], [4.6, 3.6, 1, .2, 0], [5.1, 3.3, 1.7, .5, 0], [4.8, 3.4, 1.9, .2, 0], [7, 3.2, 4.7, 1.4, 1], [6.4, 3.2, 4.5, 1.5, 1], [6.9, 3.1, 4.9, 1.5, 1], [5.5, 2.3, 4, 1.3, 1], [6.5, 2.8, 4.6, 1.5, 1], [5.7, 2.8, 4.5, 1.3, 1], [6.3, 3.3, 4.7, 1.6, 1], [4.9, 2.4, 3.3, 1, 1], [6.6, 2.9, 4.6, 1.3, 1], [5.2, 2.7, 3.9, 1.4, 1], [5, 2, 3.5, 1, 1], [5.9, 3, 4.2, 1.5, 1], [6, 2.2, 4, 1, 1], [6.1, 2.9, 4.7, 1.4, 1], [5.6, 2.9, 3.6, 1.3, 1], [6.7, 3.1, 4.4, 1.4, 1], [5.6, 3, 4.5, 1.5, 1], [5.8, 2.7, 4.1, 1, 1], [6.2, 2.2, 4.5, 1.5, 1], [5.6, 2.5, 3.9, 1.1, 1], [5.9, 3.2, 4.8, 1.8, 1], [6.1, 2.8, 4, 1.3, 1], [6.3, 2.5, 4.9, 1.5, 1], [6.1, 2.8, 4.7, 1.2, 1], [6.4, 2.9, 4.3, 1.3, 1], [6.3, 3.3, 6, 2.5, 2], [5.8, 2.7, 5.1, 1.9, 2], [7.1, 3, 5.9, 2.1, 2], [6.3, 2.9, 5.6, 1.8, 2], [6.5, 3, 5.8, 2.2, 2], [7.6, 3, 6.6, 2.1, 2], [4.9, 2.5, 4.5, 1.7, 2], [7.3, 2.9, 6.3, 1.8, 2], [6.7, 2.5, 5.8, 1.8, 2], [7.2, 3.6, 6.1, 2.5, 2], [6.5, 3.2, 5.1, 2, 2], [6.4, 2.7, 5.3, 1.9, 2], [6.8, 3, 5.5, 2.1, 2], [5.7, 2.5, 5, 2, 2], [5.8, 2.8, 5.1, 2.4, 2], [6.4, 3.2, 5.3, 2.3, 2], [6.5, 3, 5.5, 1.8, 2], [7.7, 3.8, 6.7, 2.2, 2], [7.7, 2.6, 6.9, 2.3, 2], [6, 2.2, 5, 1.5, 2], [6.9, 3.2, 5.7, 2.3, 2], [5.6, 2.8, 4.9, 2, 2], [7.7, 2.8, 6.7, 2, 2], [6.3, 2.7, 4.9, 1.8, 2], [6.7, 3.3, 5.7, 2.1, 2]];
        function getIrisData() { const mins = [4.3, 2.0, 1.0, 0.1], maxs = [7.7, 4.4, 6.9, 2.5]; return IRIS_RAW.map(r => ({ input: r.slice(0, 4).map((v, i) => (v - mins[i]) / (maxs[i] - mins[i])), output: [r[4] === 0 ? 1 : 0, r[4] === 1 ? 1 : 0, r[4] === 2 ? 1 : 0] })); }
        function makeCircle() { const d = []; for (let i = 0; i < 50; i++) { const a = Math.random() * Math.PI * 2, r = .3 + Math.random() * .25; d.push({ input: [1.3 + r * Math.cos(a), 1 + r * Math.sin(a)], output: [0] }); } for (let i = 0; i < 50; i++) { const a = Math.random() * Math.PI * 2, r = .75 + Math.random() * .35; d.push({ input: [1.3 + r * Math.cos(a), 1 + r * Math.sin(a)], output: [1] }); } return d; }
        function makeSpiral() { const d = []; for (let i = 0; i < 70; i++) { const t = i / 70 * 3 * Math.PI, r0 = t * .12; d.push({ input: [1.5 + r0 * Math.cos(t), 1 + r0 * Math.sin(t)], output: [0] }); d.push({ input: [1.5 - r0 * Math.cos(t), 1 - r0 * Math.sin(t)], output: [1] }); } return d; }

        const PRESETS = {
            "XOR": { data: [{ input: [0, 0], output: [0] }, { input: [0, 1], output: [1] }, { input: [1, 0], output: [1] }, { input: [1, 1], output: [0] }], inputNames: ["x", "y"], outputNames: ["XOR"], hiddenLayers: [{ size: 4, activation: "sigmoid" }], outputActivation: "sigmoid", learningRate: .5 },
            "Circular": { data: null, genData: makeCircle, inputNames: ["x", "y"], outputNames: ["Class"], hiddenLayers: [{ size: 6, activation: "tanh" }], outputActivation: "sigmoid", learningRate: .1 },
            "Spirals": { data: null, genData: makeSpiral, inputNames: ["x", "y"], outputNames: ["Class"], hiddenLayers: [{ size: 10, activation: "tanh" }, { size: 8, activation: "tanh" }], outputActivation: "sigmoid", learningRate: .05 },
            "Iris": { data: null, genData: getIrisData, inputNames: ["sepal_l", "sepal_w", "petal_l", "petal_w"], outputNames: ["setosa", "versicolor", "virginica"], hiddenLayers: [{ size: 8, activation: "relu" }], outputActivation: "softmax", learningRate: .01 }
        };


        // ═══════════════════════════════════════════════════════════════
        // CSV PARSER
        // ═══════════════════════════════════════════════════════════════

        function parseCSV(text) {
            const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
            const sep = lines[0].includes(";") ? ";" : ","
            const rows = lines.map(l => l.split(sep).map(s => s.trim().replace(/^"|"$/g, '')));
            const headers = rows[0], dataRows = rows.slice(1).filter(r => r.length === headers.length && r.some(c => c !== ""));
            const lastCol = headers.length - 1;
            const isNum = headers.map((_, ci) => dataRows.every(r => !isNaN(parseFloat(r[ci])) && r[ci] !== ""));
            if (!isNum[lastCol]) {
                const classes = [...new Set(dataRows.map(r => r[lastCol]))];
                const ic = []; for (let i = 0; i < lastCol; i++)if (isNum[i]) ic.push(i);
                const iN = ic.map(c => headers[c]), mins = ic.map(c => Math.min(...dataRows.map(r => parseFloat(r[c])))), maxs = ic.map(c => Math.max(...dataRows.map(r => parseFloat(r[c]))));
                const data = dataRows.map(r => ({ input: ic.map((c, i) => { const rng = maxs[i] - mins[i]; return rng === 0 ? 0 : (parseFloat(r[c]) - mins[i]) / rng; }), output: classes.map(cl => r[lastCol] === cl ? 1 : 0) }));
                return { data, inputNames: iN, outputNames: classes };
            }
            const iN = headers.slice(0, -1), oN = [headers[lastCol]], allV = dataRows.map(r => r.map(parseFloat));
            const mins = headers.map((_, i) => Math.min(...allV.map(r => r[i]))), maxs = headers.map((_, i) => Math.max(...allV.map(r => r[i])));
            const data = allV.map(r => ({ input: r.slice(0, -1).map((v, i) => { const rng = maxs[i] - mins[i]; return rng === 0 ? 0 : (v - mins[i]) / rng; }), output: [(() => { const rng = maxs[lastCol] - mins[lastCol]; return rng === 0 ? 0 : (r[lastCol] - mins[lastCol]) / rng; })()] }));
            return { data, inputNames: iN, outputNames: oN };
        }


        // ═══════════════════════════════════════════════════════════════
        // LIGHT THEME
        // ═══════════════════════════════════════════════════════════════

        const C = {
            bg: "#f5f6fa", surface: "#ffffff", surface2: "#f0f1f5",
            border: "#d8dbe6", borderLight: "#e8eaf0", text: "#1e2230", textDim: "#7a809a",
            accent: "#4373cc", accent2: "#1a9a6e", danger: "#d94444",
            orange: "#d48520", purple: "#7c5cbf",
            font: "'IBM Plex Mono','Fira Code',monospace",
            fontSans: "'DM Sans',-apple-system,'Segoe UI',sans-serif",
        };
        const CC = [[67, 115, 204], [26, 154, 110], [217, 68, 68], [212, 133, 32], [124, 92, 191], [180, 160, 40]];
        const secLabel = { fontSize: 10, fontFamily: C.fontSans, color: C.textDim, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 };


        // ═══════════════════════════════════════════════════════════════
        // EDITABLE DATA TABLE
        // ═══════════════════════════════════════════════════════════════

        function DataTable({ data, inputNames, outputNames, onDataChange, onLoadCSV }) {
            const fileRef = useRef(null);
            const [editingCell, setEditingCell] = useState(null); // {ri, ci}
            const [editValue, setEditValue] = useState("");
            const cols = [...inputNames, ...outputNames];
            const inLen = inputNames.length;

            // Update cell value with validation
            const setCell = (ri, ci, val) => {
                const nd = data.map((r, i) => i !== ri ? { input: r.input.slice(), output: r.output.slice() } : {
                    input: ci < inLen ? r.input.map((v, j) => j === ci ? val : v) : r.input.slice(),
                    output: ci >= inLen ? r.output.map((v, j) => j === ci - inLen ? val : v) : r.output.slice()
                });
                onDataChange(nd);
            };

            // Apply cell value with input validation and normalization
            const applyCellValue = (ri, ci, rawValue) => {
                if (rawValue === "") {
                    // Empty input → 0
                    const nv = 0;
                    setCell(ri, ci, nv);
                } else {
                    const normalized = rawValue.replace(/,/g, '.');
                    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(normalized)) {
                        const nv = parseFloat(normalized);
                        if (!isNaN(nv)) {
                            setCell(ri, ci, nv);
                            return;
                        }
                    }
                    // Invalid input: keep original value
                }
            };

            // Add new row with zeros
            const addRow = () => {
                const nr = {
                    input: new Array(inLen).fill(0),
                    output: new Array(outputNames.length).fill(0)
                };
                onDataChange([...data.map(r => ({ input: r.input.slice(), output: r.output.slice() })), nr]);
            };

            // Delete row with confirmation for last row
            const deleteRow = (ri) => {
                if (data.length <= 1) return;
                onDataChange(data.filter((_, i) => i !== ri).map(r => ({ input: r.input.slice(), output: r.output.slice() })));
            };

            // Rename column and update configuration
            const renameCol = (ci, newName) => {
                if (ci < inLen) {
                    const n = inputNames.slice();
                    n[ci] = newName;
                    onLoadCSV({
                        data: data.map(r => ({ input: r.input.slice(), output: r.output.slice() })),
                        inputNames: n,
                        outputNames: outputNames.slice(),
                        keepConfig: true
                    });
                }
                else {
                    const n = outputNames.slice();
                    n[ci - inLen] = newName;
                    onLoadCSV({
                        data: data.map(r => ({ input: r.input.slice(), output: r.output.slice() })),
                        inputNames: inputNames.slice(),
                        outputNames: n,
                        keepConfig: true
                    });
                }
            };

            // Handle CSV file upload
            const handleFile = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        onLoadCSV(parseCSV(ev.target.result));
                    } catch (err) {
                        alert("CSV: " + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = "";
            };

            // Clear all rows with confirmation
            const clearAllRows = () => {
                if (window.confirm("Delete all data? This action cannot be undone.")) {
                    const emptyRow = {
                        input: new Array(inputNames.length).fill(0),
                        output: new Array(outputNames.length).fill(0)
                    };
                    onDataChange([emptyRow]);
                }
            };

            // Add new input column
            const addInputColumn = () => {
                const newInputNames = [...inputNames, `input_${inputNames.length + 1}`];
                const newData = data.map(row => ({
                    input: [...row.input, 0],
                    output: row.output.slice()
                }));
                onLoadCSV({
                    data: newData,
                    inputNames: newInputNames,
                    outputNames: outputNames.slice(),
                    keepConfig: true
                });
            };

            // Add new output column
            const addOutputColumn = () => {
                const newOutputNames = [...outputNames, `output_${outputNames.length + 1}`];
                const newData = data.map(row => ({
                    input: row.input.slice(),
                    output: [...row.output, 0]
                }));
                onLoadCSV({
                    data: newData,
                    inputNames: inputNames.slice(),
                    outputNames: newOutputNames,
                    keepConfig: true
                });
            };

            // Delete input column
            const deleteInputColumn = (ci) => {
                if (inputNames.length <= 1) {
                    alert("At least one input column is required");
                    return;
                }
                const newInputNames = inputNames.filter((_, i) => i !== ci);
                const newData = data.map(row => ({
                    input: row.input.filter((_, i) => i !== ci),
                    output: row.output.slice()
                }));
                onLoadCSV({
                    data: newData,
                    inputNames: newInputNames,
                    outputNames: outputNames.slice(),
                    keepConfig: true
                });
            };

            // Delete output column
            const deleteOutputColumn = (ci) => {
                if (outputNames.length <= 1) {
                    alert("At least one output column is required");
                    return;
                }
                const newOutputNames = outputNames.filter((_, i) => i !== ci);
                const newData = data.map(row => ({
                    input: row.input.slice(),
                    output: row.output.filter((_, i) => i !== ci)
                }));
                onLoadCSV({
                    data: newData,
                    inputNames: inputNames.slice(),
                    outputNames: newOutputNames,
                    keepConfig: true
                });
            };

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexShrink: 0 }}>
                        <span style={secLabel}>Dataset · {data.length} rows</span>
                        <div style={{ display: "flex", gap: 4 }}>
                            <button onClick={addRow} style={tblBtn}>+ Row</button>
                            <button onClick={addInputColumn} style={tblBtn}>+ Input</button>
                            <button onClick={addOutputColumn} style={tblBtn}>+ Output</button>
                            <button onClick={() => fileRef.current && fileRef.current.click()} style={tblBtn}>⬆ CSV</button>
                            <button onClick={clearAllRows} style={tblBtn}>🗑️ Clear</button>
                            <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" style={{ display: "none" }} onChange={handleFile} />
                        </div>
                    </div>
                    <div style={{ flex: 1, overflow: "auto", borderRadius: 6, border: "1px solid " + C.border, minHeight: 0, background: C.surface }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: C.font }}>
                            <thead>
                                <tr>
                                    <th style={thStyle}>#</th>
                                    {inputNames.map((c, i) => (
                                        <th key={`in-${i}`} style={{ ...thStyle, color: C.accent, minWidth: 60 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                <input
                                                    className="edit-cell"
                                                    value={c}
                                                    onChange={e => renameCol(i, e.target.value)}
                                                    style={{ textAlign: "center", fontWeight: 700, fontSize: 9, color: "inherit", letterSpacing: .5, flex: 1 }}
                                                />
                                                <button
                                                    onClick={() => deleteInputColumn(i)}
                                                    style={{ background: "transparent", border: "none", color: C.danger + "88", cursor: "pointer", fontSize: 13, lineHeight: 1, marginLeft: 4 }}
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        </th>
                                    ))}
                                    {outputNames.map((c, i) => (
                                        <th key={`out-${i}`} style={{ ...thStyle, color: C.accent2, minWidth: 60 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                <input
                                                    className="edit-cell"
                                                    value={c}
                                                    onChange={e => renameCol(i + inLen, e.target.value)}
                                                    style={{ textAlign: "center", fontWeight: 700, fontSize: 9, color: "inherit", letterSpacing: .5, flex: 1 }}
                                                />
                                                <button
                                                    onClick={() => deleteOutputColumn(i)}
                                                    style={{ background: "transparent", border: "none", color: C.danger + "88", cursor: "pointer", fontSize: 13, lineHeight: 1, marginLeft: 4 }}
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        </th>
                                    ))}
                                    <th style={thStyle}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.map((row, ri) => (
                                    <tr key={ri} style={{ background: ri % 2 ? C.surface2 : "transparent" }}>
                                        <td style={{ ...tdStyle, color: C.textDim, fontSize: 9, textAlign: "center", width: 28 }}>{ri + 1}</td>
                                        {row.input.map((v, ci) => {
                                            const isEditing = editingCell?.ri === ri && editingCell?.ci === ci;
                                            const displayValue = isEditing ? editValue : (typeof v === "number" ? roundDisplay(v) : v);
                                            return (
                                                <td key={ci} style={tdStyle}>
                                                    <input
                                                        className="edit-cell"
                                                        value={displayValue}
                                                        onChange={e => setEditValue(e.target.value)}
                                                        onBlur={() => {
                                                            applyCellValue(ri, ci, editValue);
                                                            setEditingCell(null);
                                                            setEditValue("");
                                                        }}
                                                        onKeyDown={e => {
                                                            if (e.key === "Enter") {
                                                                applyCellValue(ri, ci, editValue);
                                                                setEditingCell(null);
                                                                setEditValue("");
                                                                e.target.blur();
                                                            } else if (e.key === "Escape") {
                                                                setEditingCell(null);
                                                                setEditValue("");
                                                                e.target.blur();
                                                            }
                                                        }}
                                                        onFocus={() => {
                                                            setEditingCell({ ri, ci });
                                                            setEditValue(typeof v === "number" ? v.toString() : v);
                                                        }}
                                                        style={{ color: C.text }}
                                                    />
                                                </td>
                                            );
                                        })}
                                        {row.output.map((v, ci) => {
                                            const fullCi = ci + inLen;
                                            const isEditing = editingCell?.ri === ri && editingCell?.ci === fullCi;
                                            const displayValue = isEditing ? editValue : (typeof v === "number" ? roundDisplay(v) : v);
                                            return (
                                                <td key={ci + 100} style={tdStyle}>
                                                    <input
                                                        className="edit-cell"
                                                        value={displayValue}
                                                        onChange={e => setEditValue(e.target.value)}
                                                        onBlur={() => {
                                                            applyCellValue(ri, fullCi, editValue);
                                                            setEditingCell(null);
                                                            setEditValue("");
                                                        }}
                                                        onKeyDown={e => {
                                                            if (e.key === "Enter") {
                                                                applyCellValue(ri, fullCi, editValue);
                                                                setEditingCell(null);
                                                                setEditValue("");
                                                                e.target.blur();
                                                            } else if (e.key === "Escape") {
                                                                setEditingCell(null);
                                                                setEditValue("");
                                                                e.target.blur();
                                                            }
                                                        }}
                                                        onFocus={() => {
                                                            setEditingCell({ ri, ci: fullCi });
                                                            setEditValue(typeof v === "number" ? v.toString() : v);
                                                        }}
                                                        style={{ color: C.accent2 }}
                                                    />
                                                </td>
                                            );
                                        })}
                                        <td style={{ ...tdStyle, width: 24, textAlign: "center", padding: 0 }}>
                                            <button onClick={() => deleteRow(ri)} style={{ background: "transparent", border: "none", color: C.danger + "88", cursor: "pointer", fontSize: 13, lineHeight: 1 }}>×</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Format number for display
        function roundDisplay(v) {
            if (Number.isInteger(v)) return "" + v;
            const s = v.toFixed(4);
            return s.replace(/0+$/, '').replace(/\.$/, '');
        }

        const tblBtn = {
            background: C.surface,
            border: "1px solid " + C.border,
            color: C.accent,
            padding: "3px 8px",
            borderRadius: 4,
            fontSize: 10,
            cursor: "pointer",
            fontFamily: C.font,
            fontWeight: 600
        };
        const thStyle = {
            padding: "5px 6px",
            background: C.surface2,
            borderBottom: "1px solid " + C.border,
            textAlign: "right",
            position: "sticky",
            top: 0,
            fontSize: 9,
            fontWeight: 700,
            letterSpacing: .5,
            zIndex: 1
        };
        const tdStyle = {
            padding: "2px 4px",
            textAlign: "right",
            borderBottom: "1px solid " + C.borderLight
        };


        // ═══════════════════════════════════════════════════════════════
        // LAYER CONFIG
        // ═══════════════════════════════════════════════════════════════

        const ACTS = ["relu", "sigmoid", "tanh", "softmax"];

        function LayerConfig({ hiddenLayers, outputActivation, inputCount, outputCount, onUpdate }) {
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
                        <span style={secLabel}>Architecture</span>
                        <button onClick={() => onUpdate({ hiddenLayers: [...hiddenLayers.map(l => ({ ...l })), { size: 4, activation: "relu" }] })}
                            style={{ background: C.accent + "14", border: "1px solid " + C.accent + "44", color: C.accent, padding: "3px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer", fontFamily: C.font, fontWeight: 700 }}>+ Layer</button>
                    </div>
                    <LR label="INPUT" count={inputCount} color={C.accent} />
                    {hiddenLayers.map((layer, i) => (
                        <LR key={i} label={"HIDDEN " + (i + 1)} count={layer.size} color={C.orange} activation={layer.activation}
                            onCount={v => { const nl = hiddenLayers.map((l, j) => j === i ? { ...l, size: Math.max(1, Math.min(20, v)) } : { ...l }); onUpdate({ hiddenLayers: nl }); }}
                            onAct={v => { const nl = hiddenLayers.map((l, j) => j === i ? { ...l, activation: v } : { ...l }); onUpdate({ hiddenLayers: nl }); }}
                            onRemove={() => onUpdate({ hiddenLayers: hiddenLayers.filter((_, j) => j !== i).map(l => ({ ...l })) })} />
                    ))}
                    <LR label="OUTPUT" count={outputCount} color={C.accent2} activation={outputActivation}
                        onAct={v => onUpdate({ outputActivation: v })} />
                </div>
            );
        }

        const mb = {
            background: C.surface2,
            border: "1px solid " + C.border,
            color: C.text,
            width: 22,
            height: 22,
            borderRadius: 3,
            fontSize: 14,
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 0,
            lineHeight: 1
        };

        function LR({ label, count, color, activation, onCount, onAct, onRemove }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 8px", background: C.surface, borderRadius: 6, border: "1px solid " + C.border, minHeight: 30 }}>
                    <span style={{ color, fontSize: 9, fontWeight: 800, fontFamily: C.font, minWidth: 56, letterSpacing: .3 }}>{label}</span>
                    {onCount ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
                            <button onClick={() => onCount(count - 1)} style={mb}>−</button>
                            <span style={{ color: C.text, fontSize: 13, fontWeight: 700, fontFamily: C.font, minWidth: 20, textAlign: "center" }}>{count}</span>
                            <button onClick={() => onCount(count + 1)} style={mb}>+</button>
                        </div>
                    ) : <span style={{ color: C.text, fontSize: 13, fontWeight: 700, fontFamily: C.font, minWidth: 20 }}>{count}</span>}
                    {activation && (
                        <select value={activation} onChange={e => onAct && onAct(e.target.value)}
                            style={{ background: C.surface2, border: "1px solid " + C.border, color: C.text, padding: "2px 6px", borderRadius: 4, fontSize: 10, fontFamily: C.font, marginLeft: "auto", cursor: "pointer" }}>
                            {ACTS.map(a => <option key={a} value={a}>{a}</option>)}
                        </select>
                    )}
                    {onRemove && <button onClick={onRemove} style={{ background: "transparent", border: "none", color: C.danger + "99", cursor: "pointer", fontSize: 14, lineHeight: 1, padding: "0 2px" }}>×</button>}
                </div>
            );
        }


        // ═══════════════════════════════════════════════════════════════
        // NETWORK GRAPH (SVG)
        // ═══════════════════════════════════════════════════════════════

        function NetworkGraph({ network, inputNames, outputNames, layerOutputs }) {
            const [hover, setHover] = useState(null);
            if (!network || !network.length) return <div style={{ color: C.textDim, textAlign: "center", padding: 30, fontFamily: C.font, fontSize: 12 }}>No network</div>;

            const allSizes = [network[0].prevSize].concat(network.map(l => l.size));
            const numL = allSizes.length, maxN = Math.max(...allSizes);
            const W = 420, H = 300, padX = 44, padY = 26;

            const getPos = (li, ni) => {
                const cnt = allSizes[li], x = padX + (li / (numL - 1)) * (W - padX * 2);
                const sp = Math.min(28, (H - padY * 2) / Math.max(cnt, 1)), tot = (cnt - 1) * sp;
                return { x, y: (H - tot) / 2 + ni * sp };
            };

            let mW = .01; for (const l of network) for (const ws of l.weights) for (const w of ws) mW = Math.max(mW, Math.abs(w));
            const labels = ["Input"].concat(network.map((_, i) => i < network.length - 1 ? "Hidden " + (i + 1) : "Output"));
            const colors = [C.accent].concat(network.map((_, i) => i < network.length - 1 ? C.orange : C.accent2));

            return (
                <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "100%" }}>
                    {network.map((layer, l) => layer.weights.map((ws, j) => ws.map((w, k) => {
                        const from = getPos(l, k), to = getPos(l + 1, j);
                        const isH = hover && hover.l === l + 1 && hover.n === j;
                        const inten = Math.abs(w) / mW;
                        return (<g key={"e" + l + "-" + k + "-" + j}>
                            <line x1={from.x} y1={from.y} x2={to.x} y2={to.y}
                                stroke={isH ? "#333" : (w >= 0 ? C.accent : C.danger)} strokeWidth={isH ? 2.5 : Math.max(.3, inten * 2)}
                                opacity={isH ? 1 : Math.min(.6, inten * .5 + .06)} style={{ cursor: "crosshair" }} />
                        </g>);
                    })))}
                    {allSizes.map((cnt, l) => (
                        <g key={"L" + l}>
                            <text x={getPos(l, 0).x} y={padY - 10} textAnchor="middle" fill={colors[l]}
                                style={{ fontSize: 7, fontFamily: C.font, fontWeight: 700, textTransform: "uppercase", letterSpacing: .4 }}>{labels[l]}</text>
                            {Array.from({ length: cnt }).map((_, n) => {
                                const { x, y } = getPos(l, n), r = Math.min(10, 120 / maxN);
                                const val = layerOutputs && layerOutputs[l] && layerOutputs[l][n];
                                const op = val != null ? Math.min(1, Math.abs(val) * .7 + .2) : .2;
                                const nl = l === 0 ? (inputNames[n] || "").slice(0, 3) : (l === numL - 1 ? (outputNames[n] || "").slice(0, 4) : null);
                                const isHover = hover && hover.l === l && hover.n === n;
                                return (<g key={n}>
                                    <circle cx={x} cy={y} r={r} fill={colors[l]} fillOpacity={op} stroke={isHover ? "#333" : colors[l]} strokeWidth={isHover ? 2 : 1} strokeOpacity={isHover ? 1 : .5}
                                        onMouseEnter={() => setHover({ l, n })} onMouseLeave={() => setHover(null)} />
                                    {isHover && l > 0 && (
                                        <g>
                                            {network[l - 1].weights[n].map((w, k) => {
                                                const from = getPos(l - 1, k), to = getPos(l, n);
                                                const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
                                                return (
                                                    <g key={"w" + k}>
                                                        <rect x={mx - 28} y={my - 10} width={56} height={20} rx={4} fill={C.surface} stroke={C.border} strokeWidth={1} />
                                                        <text x={mx} y={my + 4} textAnchor="middle" fill={C.text} style={{ fontSize: 9, fontFamily: C.font, fontWeight: 600 }}>{w.toFixed(4)}</text>
                                                    </g>
                                                );
                                            })}
                                        </g>
                                    )}
                                    {nl && <text x={x} y={y + 3} textAnchor="middle" fill={C.text} style={{ fontSize: Math.min(7, r * 1.1), fontFamily: C.font, fontWeight: 700 }}>{nl}</text>}
                                </g>);
                            })}
                        </g>
                    ))}
                </svg>
            );
        }


        // ═══════════════════════════════════════════════════════════════
        // VIZ 2D — always visible, feature-selectable
        // ═══════════════════════════════════════════════════════════════

        function Viz2D({ networkRef, data, inputNames, outputCount, renderTick }) {
            const canvasRef = useRef(null);
            const [fX, setFX] = useState(0);
            const [fY, setFY] = useState(Math.min(1, inputNames.length - 1));
            const inLen = inputNames.length;

            // reset feature indices when inputNames change
            useEffect(() => {
                setFX(0);
                setFY(Math.min(1, inputNames.length - 1));
            }, [inputNames.length]);

            useEffect(() => {
                const canvas = canvasRef.current, net = networkRef.current;
                if (!canvas || !net || !data || !data.length) return;
                const ctx = canvas.getContext("2d"), w = canvas.width, h = canvas.height;
                ctx.clearRect(0, 0, w, h);

                // build base input from first sample (fill non-plotted features with mean)
                const means = [];
                for (let f = 0; f < inLen; f++) {
                    let s = 0;
                    for (const d of data) s += d.input[f];
                    means.push(s / data.length);
                }

                let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
                for (const d of data) {
                    mnX = Math.min(mnX, d.input[fX]); mxX = Math.max(mxX, d.input[fX]);
                    mnY = Math.min(mnY, d.input[fY]); mxY = Math.max(mxY, d.input[fY]);
                }
                const pad = .15 * (mxX - mnX + .01); mnX -= pad; mxX += pad;
                const padY = .15 * (mxY - mnY + .01); mnY -= padY; mxY += padY;

                // Ensure valid range
                if (mxX <= mnX) mxX = mnX + 1;
                if (mxY <= mnY) mxY = mnY + 1;

                const res = 40, cw = w / res, ch = h / res;
                const isMulti = outputCount >= 2;

                for (let gx = 0; gx < res; gx++) {
                    for (let gy = 0; gy < res; gy++) {
                        const px = mnX + (gx + .5) / res * (mxX - mnX), py = mnY + (gy + .5) / res * (mxY - mnY);
                        const inp = means.slice(); inp[fX] = px; inp[fY] = py;
                        const { output } = forwardPass(net, inp);
                        let r, g, b, a;
                        if (isMulti) {
                            const mi = output.indexOf(Math.max(...output));
                            const cc = CC[mi % CC.length];
                            r = cc[0]; g = cc[1]; b = cc[2];
                            a = .08 + Math.max(...output) * .2;
                        }
                        else {
                            const v = clamp(output[0], 0, 1);
                            r = Math.round(67 + (217 - 67) * v);
                            g = Math.round(115 + (68 - 115) * v);
                            b = Math.round(204 + (68 - 204) * v);
                            a = .12 + Math.abs(v - .5) * .35;
                        }
                        ctx.fillStyle = "rgba(" + r + "," + g + "," + b + "," + a + ")";
                        ctx.fillRect(gx * cw, (res - 1 - gy) * ch, cw + 1, ch + 1);
                    }
                }

                for (const d of data) {
                    const sx = ((d.input[fX] - mnX) / (mxX - mnX)) * w, sy = h - ((d.input[fY] - mnY) / (mxY - mnY)) * h;
                    const ci = d.output.length === 1 ? (d.output[0] > .5 ? 1 : 0) : d.output.indexOf(Math.max(...d.output));
                    const cc = CC[ci % CC.length];
                    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI * 2);
                    ctx.fillStyle = "rgb(" + cc[0] + "," + cc[1] + "," + cc[2] + ")"; ctx.fill();
                    ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 1.2; ctx.stroke();
                }

                // axis labels
                ctx.fillStyle = C.textDim; ctx.font = "10px " + C.fontSans;
                ctx.fillText(inputNames[fX] || "x", w - ctx.measureText(inputNames[fX] || "x").width - 6, h - 6);
                ctx.save(); ctx.translate(12, 14); ctx.fillText(inputNames[fY] || "y", 0, 0); ctx.restore();
            }, [networkRef, data, outputCount, renderTick, fX, fY, inLen]);

            const dd = {
                background: C.surface,
                border: "1px solid " + C.border,
                color: C.text,
                padding: "2px 4px",
                borderRadius: 4,
                fontSize: 10,
                fontFamily: C.font,
                cursor: "pointer"
            };

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, flexShrink: 0, flexWrap: "wrap" }}>
                        <span style={secLabel}>2D View</span>
                        <span style={{ fontSize: 9, color: C.textDim, fontFamily: C.font }}>X:</span>
                        <select value={fX} onChange={e => setFX(parseInt(e.target.value))} style={dd}>
                            {inputNames.map((n, i) => <option key={i} value={i}>{n}</option>)}
                        </select>
                        <span style={{ fontSize: 9, color: C.textDim, fontFamily: C.font }}>Y:</span>
                        <select value={fY} onChange={e => setFY(parseInt(e.target.value))} style={dd}>
                            {inputNames.map((n, i) => <option key={i} value={i}>{n}</option>)}
                        </select>
                    </div>
                    <div style={{ flex: 1, borderRadius: 6, border: "1px solid " + C.border, overflow: "hidden", background: "#fff", minHeight: 0 }}>
                        <canvas ref={canvasRef} width={360} height={260} style={{ width: "100%", height: "100%", display: "block" }} />
                    </div>
                </div>
            );
        }


        // ═══════════════════════════════════════════════════════════════
        // LOSS CHART (larger)
        // ═══════════════════════════════════════════════════════════════

        function LossChart({ history, loss, epoch, fixedMax }) {
            const W = 400, H = 160;
            const maxL = fixedMax > 0 ? fixedMax : .001;
            const pts = history.length > 1 ? history.map((v, i) => "" + (28 + (i / (history.length - 1)) * (W - 48)) + "," + (10 + (1 - Math.min(v, maxL) / maxL) * (H - 30))).join(" ") : "";

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexShrink: 0, flexWrap: "wrap" }}>
                        <span style={secLabel}>Training Loss</span>
                        <Pill label="Epoch" value={epoch} color={C.accent} />
                        <Pill label="Loss" value={loss.toFixed(6)} color={loss < .1 ? C.accent2 : loss < .5 ? C.orange : C.danger} />
                    </div>
                    <div style={{ flex: 1, borderRadius: 6, border: "1px solid " + C.border, overflow: "hidden", background: C.surface, minHeight: 0 }}>
                        <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "100%" }} preserveAspectRatio="none">
                            {[0, .25, .5, .75, 1].map(f => {
                                const y = 10 + (1 - f) * (H - 30); return (
                                    <g key={f}><line x1={28} y1={y} x2={W - 16} y2={y} stroke={C.borderLight} strokeWidth={.5} />
                                        <text x={26} y={y + 3} textAnchor="end" fill={C.textDim} style={{ fontSize: 7, fontFamily: C.font }}>{(maxL * f).toFixed(3)}</text>
                                    </g>);
                            })}
                            {pts && <polyline points={pts} fill="none" stroke={C.accent} strokeWidth={2} strokeLinejoin="round" opacity={.8} />}
                            {history.length < 2 && <text x={W / 2} y={H / 2} textAnchor="middle" fill={C.textDim} style={{ fontSize: 11, fontFamily: C.fontSans }}>Press Train to start</text>}
                        </svg>
                    </div>
                </div>
            );
        }


        // ═══════════════════════════════════════════════════════════════
        // CONFUSION MATRIX
        // ═══════════════════════════════════════════════════════════════

        function ConfusionMatrix({ networkRef, data, outputNames, renderTick }) {
            const net = networkRef.current;
            const nClasses = outputNames.length;
            const isBinary = nClasses === 1;
            const labels = isBinary ? ["0", "1"] : outputNames;
            const dim = isBinary ? 2 : nClasses;

            // build matrix
            const matrix = Array.from({ length: dim }, () => new Array(dim).fill(0));
            let correct = 0, total = data.length;

            if (net && data.length > 0) {
                for (const s of data) {
                    const { output } = forwardPass(net, s.input);
                    let pred, actual;
                    if (isBinary) {
                        pred = output[0] >= .5 ? 1 : 0;
                        actual = s.output[0] >= .5 ? 1 : 0;
                    } else {
                        pred = output.indexOf(Math.max(...output));
                        actual = s.output.indexOf(Math.max(...s.output));
                    }
                    if (pred >= 0 && pred < dim && actual >= 0 && actual < dim) matrix[actual][pred]++;
                    if (pred === actual) correct++;
                }
            }

            const accuracy = total > 0 ? (correct / total * 100) : 0;
            const maxVal = Math.max(1, ...matrix.flat());

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexShrink: 0, flexWrap: "wrap" }}>
                        <span style={secLabel}>Confusion Matrix</span>
                        <Pill label="Accuracy" value={accuracy.toFixed(1) + "%"} color={accuracy > 90 ? C.accent2 : accuracy > 60 ? C.orange : C.danger} />
                    </div>
                    <div style={{ flex: 1, borderRadius: 6, border: "1px solid " + C.border, overflow: "hidden", background: C.surface, minHeight: 0, display: "flex", alignItems: "center", justifyContent: "center", padding: 10 }}>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0 }}>
                            {/* header row */}
                            <div style={{ display: "flex", alignItems: "center", marginBottom: 2 }}>
                                <div style={{ width: 52, height: 20 }} />
                                <div style={{ display: "flex", gap: 2 }}>
                                    {labels.map((l, i) => (
                                        <div key={i} style={{ width: Math.max(40, 140 / dim), textAlign: "center", fontSize: 8, fontFamily: C.font, color: C.accent, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.slice(0, 6)}</div>
                                    ))}
                                </div>
                            </div>
                            <div style={{ fontSize: 7, color: C.textDim, fontFamily: C.font, marginBottom: 3, letterSpacing: .5 }}>PREDICTED →</div>
                            {/* rows */}
                            <div style={{ display: "flex" }}>
                                <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", marginRight: 4 }}>
                                    <div style={{ fontSize: 7, color: C.textDim, fontFamily: C.font, writingMode: "vertical-lr", transform: "rotate(180deg)", letterSpacing: .5 }}>ACTUAL →</div>
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                                    {labels.map((l, i) => (
                                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 2 }}>
                                            <div style={{ width: 40, textAlign: "right", fontSize: 8, fontFamily: C.font, color: C.accent2, fontWeight: 700, paddingRight: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.slice(0, 6)}</div>
                                            {labels.map((_, j) => {
                                                const v = matrix[i][j];
                                                const isDiag = i === j;
                                                const intensity = v / maxVal;
                                                const bgColor = isDiag
                                                    ? "rgba(26,154,110," + (intensity * .35 + .05) + ")"
                                                    : "rgba(217,68,68," + (intensity * .3 + .02) + ")";
                                                return (
                                                    <div key={j} style={{
                                                        width: Math.max(40, 140 / dim), height: Math.max(32, 120 / dim),
                                                        display: "flex", alignItems: "center", justifyContent: "center",
                                                        background: bgColor, border: "1px solid " + C.borderLight,
                                                        fontSize: dim <= 4 ? 13 : 10, fontWeight: 700, fontFamily: C.font,
                                                        color: isDiag ? C.accent2 : v > 0 ? C.danger : C.textDim + "66",
                                                        borderRadius: 2
                                                    }}>{v}</div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Pill({ label, value, color }) {
            return (<div style={{ background: C.surface, padding: "3px 10px", borderRadius: 5, border: "1px solid " + C.border, display: "flex", gap: 5, alignItems: "center" }}>
                <span style={{ color: C.textDim, fontSize: 10, fontFamily: C.font }}>{label}</span>
                <span style={{ color, fontWeight: 700, fontSize: 12, fontFamily: C.font }}>{value}</span>
            </div>);
        }


        // ═══════════════════════════════════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════════════════════════════════

        function App() {
            const [preset, setPreset] = useState("XOR");
            const [data, setData] = useState(PRESETS.XOR.data.map(r => ({ input: r.input.slice(), output: r.output.slice() })));
            const [inputNames, setInputNames] = useState(PRESETS.XOR.inputNames.slice());
            const [outputNames, setOutputNames] = useState(PRESETS.XOR.outputNames.slice());
            const [hiddenLayers, setHiddenLayers] = useState(PRESETS.XOR.hiddenLayers.map(l => ({ ...l })));
            const [outputActivation, setOutputActivation] = useState(PRESETS.XOR.outputActivation);
            const [lr, setLr] = useState(PRESETS.XOR.learningRate);
            const [epoch, setEpoch] = useState(0);
            const [loss, setLoss] = useState(0);
            const [running, setRunning] = useState(false);
            const [lossHistory, setLossHistory] = useState([]);
            const [layerOutputs, setLayerOutputs] = useState(null);
            const [renderTick, setRenderTick] = useState(0);

            const netRef = useRef(null), runRef = useRef(false), epochRef = useRef(0), lrRef = useRef(lr), dataRef = useRef(data), lossMaxRef = useRef(0);
            useEffect(() => { lrRef.current = lr; }, [lr]);
            useEffect(() => { dataRef.current = data; }, [data]);

            const inCount = inputNames.length, outCount = outputNames.length;

            // Automatically adjust output activation when output columns change
            useEffect(() => {
                if (outputNames.length > 1 && outputActivation !== "softmax") {
                    setOutputActivation("softmax");
                } else if (outputNames.length === 1 && outputActivation === "softmax") {
                    setOutputActivation("sigmoid");
                }
            }, [outputNames.length, outputActivation]);

            const buildNetwork = useCallback(() => {
                const sizes = [inCount].concat(hiddenLayers.map(l => l.size), [outCount]);
                const acts = hiddenLayers.map(l => l.activation).concat([outputActivation]);
                netRef.current = createNetwork(sizes, acts);
                epochRef.current = 0; setEpoch(0); setLoss(0); setLossHistory([]); setLayerOutputs(null);
                setRunning(false); runRef.current = false; lossMaxRef.current = 0; setRenderTick(t => t + 1);
            }, [inCount, outCount, hiddenLayers, outputActivation]);

            useEffect(() => { buildNetwork(); }, [buildNetwork]);

            const loadPreset = (name) => {
                runRef.current = false; setRunning(false);
                const p = PRESETS[name];
                const d = p.data ? p.data.map(r => ({ input: r.input.slice(), output: r.output.slice() })) : p.genData();
                setPreset(name); setData(d); setInputNames(p.inputNames.slice()); setOutputNames(p.outputNames.slice());
                setHiddenLayers(p.hiddenLayers.map(l => ({ ...l }))); setOutputActivation(p.outputActivation); setLr(p.learningRate);
            };

            const handleCSV = (result) => {
                runRef.current = false;
                setRunning(false);

                if (!result.keepConfig) {
                    setPreset("Custom");
                    // Aktualisiere Output-Aktivierung basierend auf neuer Spaltenanzahl
                    const newOutputActivation = result.outputNames.length > 1 ? "softmax" : "sigmoid";
                    setOutputActivation(newOutputActivation);
                    setHiddenLayers([{ size: Math.max(4, Math.min(12, result.inputNames.length * 2)), activation: "relu" }]);
                    setLr(0.01);
                }

                // 🔥 SOFORTIGES NEU-INITIALISIEREN DES NETZWERKS MIT NEUEN DIMENSIONEN
                const newInCount = result.inputNames.length;
                const newOutCount = result.outputNames.length;
                const newHiddenLayers = result.keepConfig ? hiddenLayers : [{ size: Math.max(4, Math.min(12, newInCount * 2)), activation: "relu" }];
                const newOutputActivation = result.keepConfig ? outputActivation : (newOutCount > 1 ? "softmax" : "sigmoid");

                const sizes = [newInCount].concat(newHiddenLayers.map(l => l.size), [newOutCount]);
                const acts = newHiddenLayers.map(l => l.activation).concat([newOutputActivation]);
                netRef.current = createNetwork(sizes, acts);
                epochRef.current = 0;
                lossMaxRef.current = 0;
                setLayerOutputs(null);

                // Aktualisiere State
                setData(result.data);
                setInputNames(result.inputNames);
                setOutputNames(result.outputNames);
                if (!result.keepConfig) {
                    setHiddenLayers(newHiddenLayers);
                    setOutputActivation(newOutputActivation);
                }

                // Reset Training-State
                setEpoch(0);
                setLoss(0);
                setLossHistory([]);
                setRenderTick(t => t + 1);
            };


            const handleConfigUpdate = (u) => {
                if (u.hiddenLayers !== undefined) setHiddenLayers(u.hiddenLayers);
                if (u.outputActivation !== undefined) setOutputActivation(u.outputActivation);
            };

            const trainLoop = useCallback(() => {
                if (!runRef.current || !netRef.current) return;
                let l = 0; for (let i = 0; i < 50; i++) { l = trainStep(netRef.current, dataRef.current, lrRef.current); epochRef.current++; }
                setLoss(l); setEpoch(epochRef.current);
                if (lossMaxRef.current === 0 && l > 0) lossMaxRef.current = l * 1.15;
                setLossHistory(prev => { const h = prev.concat([l]); return h.length > 300 ? h.slice(-300) : h; });
                if (dataRef.current.length > 0) { const r = forwardPass(netRef.current, dataRef.current[0].input); setLayerOutputs(r.layerOutputs); }
                setRenderTick(t => t + 1);
                if (runRef.current) requestAnimationFrame(trainLoop);
            }, []);

            const onTrain = () => { if (!netRef.current) buildNetwork(); runRef.current = true; setRunning(true); requestAnimationFrame(trainLoop); };
            const onStop = () => { runRef.current = false; setRunning(false); };
            const onReset = () => { runRef.current = false; setRunning(false); buildNetwork(); };

            const btnBase = { border: "none", padding: "7px 18px", borderRadius: 6, fontSize: 12, fontFamily: C.fontSans, fontWeight: 700, cursor: "pointer" };

            return (
                <div style={{ width: 1200, minHeight: 800, background: C.bg, color: C.text, fontFamily: C.fontSans, display: "flex", flexDirection: "column", overflow: "visible", borderRadius: 10, border: "1px solid " + C.border, boxShadow: "0 2px 24px rgba(0,0,0,0.08)" }}>

                    {/* ── HEADER ─────────────────────────────────────────── */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 16px", borderBottom: "1px solid " + C.border, flexShrink: 0, background: C.surface }}>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
                            <h1 style={{ fontSize: 16, fontWeight: 700, margin: 0, fontFamily: C.font, letterSpacing: -.5, color: C.text }}>Neural Network Demo</h1>
                            <span style={{ fontSize: 10, color: C.textDim, fontFamily: C.font }}>{preset === "Custom" ? "Custom Dataset" : preset}</span>
                        </div>
                        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                            {Object.keys(PRESETS).map(n => (
                                <button key={n} onClick={() => loadPreset(n)} style={{
                                    background: preset === n ? C.accent + "18" : "transparent", border: "1px solid " + (preset === n ? C.accent + "66" : C.border),
                                    color: preset === n ? C.accent : C.textDim, padding: "4px 11px", borderRadius: 5, fontSize: 10, cursor: "pointer",
                                    fontFamily: C.font, fontWeight: preset === n ? 700 : 400
                                }}>{n}</button>
                            ))}
                        </div>
                    </div>

                    {/* ── CONTROLS ───────────────────────────────────────── */}
                    <div style={{ padding: "6px 16px", borderBottom: "1px solid " + C.border, flexShrink: 0, background: C.surface, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <button onClick={onTrain} disabled={running} style={{ ...btnBase, background: running ? C.surface2 : C.accent, color: running ? C.textDim : "#fff" }}>▶ Train</button>
                        <button onClick={onStop} disabled={!running} style={{ ...btnBase, background: !running ? C.surface2 : C.orange, color: !running ? C.textDim : "#fff" }}>■ Stop</button>
                        <button onClick={onReset} style={{ ...btnBase, background: C.surface2, color: C.text, border: "1px solid " + C.border }}>↺ Reset</button>
                        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8, fontSize: 10, fontFamily: C.font }}>
                            <span style={{ color: C.textDim, fontWeight: 600 }}>Learning Rate</span>
                            <input type="range" min={-4} max={0} step={.05} value={Math.log10(lr)}
                                onChange={e => setLr(Math.pow(10, parseFloat(e.target.value)))}
                                style={{ width: 80, accentColor: C.accent }} />
                            <span style={{ color: C.text, minWidth: 50, fontWeight: 600 }}>{lr.toFixed(4)}</span>
                        </div>
                    </div>

                    {/* ── TOP ROW: Table | Architecture | Network ────────── */}
                    <div style={{ flex: "0 0 380px", display: "flex", overflow: "hidden", borderBottom: "1px solid " + C.border }}>

                        {/* Table */}
                        <div style={{ width: 320, flexShrink: 0, padding: 10, overflow: "hidden", display: "flex", flexDirection: "column", borderRight: "1px solid " + C.border }}>
                            <DataTable
                                data={data}
                                inputNames={inputNames}
                                outputNames={outputNames}
                                onDataChange={setData}
                                onLoadCSV={handleCSV}
                            />
                        </div>

                        {/* Architecture */}
                        <div style={{ width: 290, flexShrink: 0, padding: 10, overflow: "auto", borderRight: "1px solid " + C.border }}>
                            <LayerConfig
                                hiddenLayers={hiddenLayers}
                                outputActivation={outputActivation}
                                inputCount={inCount}
                                outputCount={outCount}
                                onUpdate={handleConfigUpdate}
                            />
                        </div>

                        {/* Network Visualization */}
                        <div style={{ flex: 1, padding: 10, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 4, flexShrink: 0 }}>
                                <span style={secLabel}>Network</span>
                                <span style={{ fontSize: 8, color: C.textDim + "99", fontFamily: C.font }}>hover nodes for weights</span>
                            </div>
                            <div style={{ flex: 1, borderRadius: 6, border: "1px solid " + C.border, background: C.surface, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", minHeight: 0 }}>
                                <NetworkGraph
                                    network={netRef.current}
                                    inputNames={inputNames}
                                    outputNames={outputNames}
                                    layerOutputs={layerOutputs}
                                />
                            </div>
                        </div>
                    </div>

                    {/* ── BOTTOM ROW: Loss | Confusion Matrix | 2D Viz ──── */}
                    <div style={{ height: 280, display: "flex", overflow: "hidden" }}>

                        {/* Loss Chart */}
                        <div style={{ flex: 1, padding: 10, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0, borderRight: "1px solid " + C.border }}>
                            <LossChart
                                history={lossHistory}
                                loss={loss}
                                epoch={epoch}
                                fixedMax={lossMaxRef.current}
                            />
                        </div>

                        {/* Confusion Matrix */}
                        <div style={{ flex: 1, padding: 10, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0, borderRight: "1px solid " + C.border }}>
                            <ConfusionMatrix
                                networkRef={netRef}
                                data={data}
                                outputNames={outputNames}
                                renderTick={renderTick}
                            />
                        </div>

                        {/* 2D Visualization */}
                        <div style={{ width: 380, flexShrink: 0, padding: 10, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0 }}>
                            <Viz2D
                                networkRef={netRef}
                                data={data}
                                inputNames={inputNames}
                                outputCount={outCount}
                                renderTick={renderTick}
                            />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
